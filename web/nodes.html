<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleFlow - 节点管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#f5f5f5',
                            card: '#ffffff',
                            border: '#e5e5e5',
                            text: '#333333',
                            muted: '#666666',
                            primary: '#18c865',
                            primaryHover: '#15b25a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .input-base { background: #ffffff; border: 1px solid #e5e5e5; color: #333333; transition: all 0.15s ease; }
        .input-base:focus { border-color: #18c865; outline: none; box-shadow: 0 0 0 3px rgba(24, 200, 101, 0.1); }
        .btn-primary { background: #18c865; color: #ffffff; font-weight: 600; transition: all 0.15s ease; }
        .btn-primary:hover:not(:disabled) { background: #15b25a; }
        .btn-secondary { background: #ffffff; color: #333333; border: 1px solid #e5e5e5; transition: all 0.15s ease; }
        .btn-secondary:hover { background: #f8f8f8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Plus: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            ),
            Edit: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            ),
            Trash: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
            ),
            X: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                </svg>
            ),
            Save: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
            ),
            Check: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            ),
        };

        const api = {
            async get(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async post(url, data) {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async put(url, data) {
                const res = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async delete(url) {
                const res = await fetch(url, { method: 'DELETE' });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async patch(url, data) {
                const res = await fetch(url, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
        };

        const Header = ({ currentPage }) => {
            const menuItems = [
                { id: 'subscriptions', label: '订阅源管理', href: '/web/subscriptions.html' },
                { id: 'nodes', label: '节点管理', href: '/web/nodes.html' },
                { id: 'configs', label: '配置生成', href: '/web/configs.html' },
                { id: 'templates', label: '模板管理', href: '/web/templates.html' },
            ];

            return (
                <div className="bg-white border-b border-gray-200">
                    <div className="max-w-4xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h1 className="text-xl font-semibold text-gray-900">RuleFlow</h1>
                                <p className="text-sm text-gray-600">订阅转换服务</p>
                            </div>
                            <a href="/" className="text-sm text-gray-600 hover:text-gray-900">返回首页</a>
                        </div>
                        <div className="flex gap-6">
                            {menuItems.map((item) => (
                                <a key={item.id} href={item.href}
                                    className={`pb-2 text-sm font-medium ${
                                        currentPage === item.id
                                            ? 'border-b-2 border-green-500 text-green-600'
                                            : 'text-gray-600 hover:text-gray-900'
                                    }`}>
                                    {item.label}
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const NodeManager = () => {
            const [nodes, setNodes] = useState([]);
            const [stats, setStats] = useState(null);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({
                name: '',
                protocol: 'trojan',
                server: '',
                port: 443,
                config: {},
                tags: [],
                enabled: true
            });
            const [loading, setLoading] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            const [filter, setFilter] = useState({ source: '', protocol: '', enabled: '', tags: '' });
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);

            const loadNodes = async () => {
                try {
                    const params = new URLSearchParams();
                    if (filter.source) params.append('source', filter.source);
                    if (filter.protocol) params.append('protocol', filter.protocol);
                    if (filter.enabled !== '') params.append('enabled', filter.enabled);
                    if (filter.tags) params.append('tags', filter.tags);

                    const url = `/api/nodes${params.toString() ? '?' + params.toString() : ''}`;
                    const data = await api.get(url);
                    setNodes(data.data || []);
                } catch (err) {
                    setError(err.message);
                }
            };

            const loadStats = async () => {
                try {
                    const data = await api.get('/api/nodes/stats');
                    setStats(data.data || {});
                } catch (err) {
                    console.error('Failed to load stats:', err);
                }
            };

            useEffect(() => { loadNodes(); loadStats(); }, [filter]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setSuccess(null);
                try {
                    if (editing) {
                        await api.put(`/api/nodes/${editing}`, form);
                        setSuccess('节点更新成功');
                    } else {
                        await api.post('/api/nodes', form);
                        setSuccess('节点创建成功');
                    }
                    setEditing(null);
                    setForm({
                        name: '',
                        protocol: 'trojan',
                        server: '',
                        port: 443,
                        config: {},
                        tags: [],
                        enabled: true
                    });
                    loadNodes();
                    loadStats();
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('确定要删除这个节点吗？')) return;
                try {
                    await api.delete(`/api/nodes/${id}`);
                    loadNodes();
                    loadStats();
                } catch (err) {
                    setError(err.message);
                }
            };

            const handleBatchEnable = async (enabled) => {
                if (selectedIds.length === 0) return;
                try {
                    await api.patch('/api/nodes/batch', {
                        ids: selectedIds,
                        action: enabled ? 'enable' : 'disable'
                    });
                    setSelectedIds([]);
                    loadNodes();
                    loadStats();
                } catch (err) {
                    setError(err.message);
                }
            };

            const handleEdit = (node) => {
                setEditing(node.id);
                setForm({
                    name: node.name,
                    protocol: node.protocol,
                    server: node.server,
                    port: node.port,
                    config: node.config || {},
                    tags: node.tags || [],
                    enabled: node.enabled
                });
                setError(null);
            };

            const toggleSelect = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
                );
            };

            const toggleSelectAll = () => {
                if (selectedIds.length === nodes.length) {
                    setSelectedIds([]);
                } else {
                    setSelectedIds(nodes.map(n => n.id));
                }
            };

            const protocolColors = {
                trojan: 'bg-green-100 text-green-700',
                vmess: 'bg-blue-100 text-blue-700',
                vless: 'bg-purple-100 text-purple-700',
                ss: 'bg-orange-100 text-orange-700',
                hysteria2: 'bg-pink-100 text-pink-700',
                tuic: 'bg-cyan-100 text-cyan-700',
            };

            const sourceLabels = {
                'manual': '手动添加',
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Header currentPage="nodes" />

                    {error && (
                        <div className="max-w-4xl mx-auto px-6 mt-4">
                            <div className="p-4 bg-red-50 border border-red-200 rounded flex items-center justify-between">
                                <span className="text-red-700 text-sm">{error}</span>
                                <button onClick={() => setError(null)} className="text-red-500 hover:text-red-700"><Icons.X /></button>
                            </div>
                        </div>
                    )}

                    {success && (
                        <div className="max-w-4xl mx-auto px-6 mt-4">
                            <div className="p-4 bg-green-50 border border-green-200 rounded flex items-center justify-between">
                                <span className="text-green-700 text-sm flex items-center gap-2">
                                    <Icons.Check />{success}
                                </span>
                                <button onClick={() => setSuccess(null)} className="text-green-500 hover:text-green-700"><Icons.X /></button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto px-6 py-6 space-y-6">
                        {stats && (
                            <div className="bg-white rounded-lg shadow-sm border p-6">
                                <h2 className="text-lg font-semibold mb-4">节点统计</h2>
                                <div className="grid grid-cols-4 gap-4">
                                    <div className="text-center">
                                        <div className="text-2xl font-bold text-gray-900">{stats.total || 0}</div>
                                        <div className="text-sm text-gray-500">总节点</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-2xl font-bold text-green-600">{stats.enabled || 0}</div>
                                        <div className="text-sm text-gray-500">已启用</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-2xl font-bold text-blue-600">{stats.by_source?.manual || 0}</div>
                                        <div className="text-sm text-gray-500">手动节点</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-2xl font-bold text-purple-600">{Object.values(stats.by_protocol || {}).reduce((a, b) => a + b, 0)}</div>
                                        <div className="text-sm text-gray-500">订阅节点</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-lg shadow-sm border p-6">
                            <h2 className="text-lg font-semibold mb-4">{editing ? '编辑节点' : '添加节点'}</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">节点名称</label>
                                        <input type="text" required value={form.name}
                                            onChange={(e) => setForm({ ...form, name: e.target.value })}
                                            className="w-full px-3 py-2 input-base rounded text-sm" placeholder="My Node" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">协议</label>
                                        <select value={form.protocol} onChange={(e) => setForm({ ...form, protocol: e.target.value })}
                                            className="w-full px-3 py-2 input-base rounded text-sm">
                                            <option value="trojan">Trojan</option>
                                            <option value="vmess">VMess</option>
                                            <option value="vless">VLESS</option>
                                            <option value="ss">Shadowsocks</option>
                                            <option value="hysteria2">Hysteria2</option>
                                            <option value="tuic">TUIC</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">服务器地址</label>
                                        <input type="text" required value={form.server}
                                            onChange={(e) => setForm({ ...form, server: e.target.value })}
                                            className="w-full px-3 py-2 input-base rounded text-sm" placeholder="example.com" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">端口</label>
                                        <input type="number" required value={form.port}
                                            onChange={(e) => setForm({ ...form, port: parseInt(e.target.value) })}
                                            className="w-full px-3 py-2 input-base rounded text-sm" placeholder="443" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">配置 (JSON)</label>
                                    <textarea value={JSON.stringify(form.config, null, 2)}
                                        onChange={(e) => {
                                            try {
                                                setForm({ ...form, config: JSON.parse(e.target.value) });
                                            } catch (err) {
                                                // 忽略 JSON 解析错误
                                            }
                                        }}
                                        className="w-full px-3 py-2 input-base rounded text-sm font-mono" rows="4"
                                        placeholder='{"password": "your-password", "sni": "example.com"}' />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">标签 (逗号分隔)</label>
                                    <input type="text" value={form.tags.join(',')}
                                        onChange={(e) => setForm({ ...form, tags: e.target.value.split(',').map(t => t.trim()).filter(t => t) })}
                                        className="w-full px-3 py-2 input-base rounded text-sm" placeholder="tag1, tag2" />
                                </div>
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2">
                                        <input type="checkbox" checked={form.enabled}
                                            onChange={(e) => setForm({ ...form, enabled: e.target.checked })} className="w-4 h-4" />
                                        <span className="text-sm">启用</span>
                                    </label>
                                </div>
                                <div className="flex gap-3">
                                    <button type="submit" disabled={loading}
                                        className="flex items-center gap-2 px-4 py-2 btn-primary rounded text-sm">
                                        <Icons.Save />{loading ? '保存中...' : (editing ? '更新' : '添加')}
                                    </button>
                                    {editing && (
                                        <button type="button" onClick={() => {
                                            setEditing(null);
                                            setForm({ name: '', protocol: 'trojan', server: '', port: 443, config: {}, tags: [], enabled: true });
                                            setError(null);
                                        }}
                                            className="px-4 py-2 btn-secondary rounded text-sm">取消</button>
                                    )}
                                </div>
                            </form>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm border overflow-hidden">
                            <div className="p-4 border-b">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-semibold">节点列表</h3>
                                    <span className="text-sm text-gray-500">{nodes.length} 个节点</span>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center gap-2">
                                        <label className="text-sm text-gray-500">筛选:</label>
                                        <select value={filter.source} onChange={(e) => setFilter({ ...filter, source: e.target.value })}
                                            className="px-2 py-1 text-sm input-base rounded">
                                            <option value="">全部来源</option>
                                            <option value="manual">手动添加</option>
                                        </select>
                                        <select value={filter.protocol} onChange={(e) => setFilter({ ...filter, protocol: e.target.value })}
                                            className="px-2 py-1 text-sm input-base rounded">
                                            <option value="">全部协议</option>
                                            <option value="trojan">Trojan</option>
                                            <option value="vmess">VMess</option>
                                            <option value="vless">VLESS</option>
                                            <option value="ss">Shadowsocks</option>
                                            <option value="hysteria2">Hysteria2</option>
                                            <option value="tuic">TUIC</option>
                                        </select>
                                        <select value={filter.enabled} onChange={(e) => setFilter({ ...filter, enabled: e.target.value })}
                                            className="px-2 py-1 text-sm input-base rounded">
                                            <option value="">全部状态</option>
                                            <option value="true">已启用</option>
                                            <option value="false">已禁用</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            {selectedIds.length > 0 && (
                                <div className="px-4 py-2 bg-blue-50 border-b flex items-center justify-between">
                                    <span className="text-sm text-blue-700">已选择 {selectedIds.length} 个节点</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleBatchEnable(true)} className="px-3 py-1 bg-green-500 text-white rounded text-sm hover:bg-green-600">启用</button>
                                        <button onClick={() => handleBatchEnable(false)} className="px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600">禁用</button>
                                    </div>
                                </div>
                            )}
                            <div className="divide-y">
                                {nodes.map((node) => (
                                    <div key={node.id} className="p-4">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <input type="checkbox" checked={selectedIds.includes(node.id)}
                                                    onChange={() => toggleSelect(node.id)} className="w-4 h-4" />
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="font-medium">{node.name}</span>
                                                        <span className={`text-xs px-2 py-0.5 rounded-full ${protocolColors[node.protocol] || 'bg-gray-100 text-gray-700'}`}>
                                                            {node.protocol.toUpperCase()}
                                                        </span>
                                                        <span className={`text-xs px-2 py-0.5 rounded-full ${node.enabled ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                                            {node.enabled ? '启用' : '禁用'}
                                                        </span>
                                                        <span className="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">
                                                            {sourceLabels[node.source] || node.source}
                                                        </span>
                                                    </div>
                                                    <div className="text-sm text-gray-600">
                                                        {node.server}:{node.port}
                                                    </div>
                                                    {node.tags && node.tags.length > 0 && (
                                                        <div className="flex items-center gap-1 mt-1">
                                                            {node.tags.map((tag, i) => (
                                                                <span key={i} className="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded">{tag}</span>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => handleEdit(node)} className="p-2 hover:bg-gray-100 rounded" title="编辑">
                                                    <Icons.Edit />
                                                </button>
                                                <button onClick={() => handleDelete(node.id)} className="p-2 hover:bg-red-50 rounded text-red-500" title="删除">
                                                    <Icons.Trash />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {nodes.length === 0 && (
                                    <div className="p-8 text-center text-gray-500">
                                        {filter.source || filter.protocol || filter.enabled !== '' ? '没有符合条件的节点' : '暂无节点，添加一个开始使用吧！'}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NodeManager />);
    </script>
</body>
</html>
