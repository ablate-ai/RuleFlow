<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuleFlow - 订阅源管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        figma: {
                            bg: '#f5f5f5',
                            card: '#ffffff',
                            border: '#e5e5e5',
                            text: '#333333',
                            muted: '#666666',
                            primary: '#18c865',
                            primaryHover: '#15b25a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .input-base { background: #ffffff; border: 1px solid #e5e5e5; color: #333333; transition: all 0.15s ease; }
        .input-base:focus { border-color: #18c865; outline: none; box-shadow: 0 0 0 3px rgba(24, 200, 101, 0.1); }
        .btn-primary { background: #18c865; color: #ffffff; font-weight: 600; transition: all 0.15s ease; }
        .btn-primary:hover:not(:disabled) { background: #15b25a; }
        .btn-secondary { background: #ffffff; color: #333333; border: 1px solid #e5e5e5; transition: all 0.15s ease; }
        .btn-secondary:hover { background: #f8f8f8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Plus: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            ),
            Edit: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            ),
            Trash: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
            ),
            Refresh: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
            ),
            Sync: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                    <path d="M16 21h5v-5"/>
                </svg>
            ),
            X: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                </svg>
            ),
            Save: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
            ),
            Check: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            ),
        };

        const api = {
            async get(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async post(url, data) {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async put(url, data) {
                const res = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
            async delete(url) {
                const res = await fetch(url, { method: 'DELETE' });
                if (!res.ok) throw new Error(await res.text());
                return res.json();
            },
        };

        const Header = ({ currentPage }) => {
            const menuItems = [
                { id: 'subscriptions', label: '订阅源管理', href: '/web/subscriptions.html' },
                { id: 'nodes', label: '节点管理', href: '/web/nodes.html' },
                { id: 'configs', label: '配置生成', href: '/web/configs.html' },
                { id: 'templates', label: '模板管理', href: '/web/templates.html' },
            ];

            return (
                <div className="bg-white border-b border-gray-200">
                    <div className="max-w-4xl mx-auto px-6 py-4">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h1 className="text-xl font-semibold text-gray-900">RuleFlow</h1>
                                <p className="text-sm text-gray-600">订阅转换服务</p>
                            </div>
                            <a href="/" className="text-sm text-gray-600 hover:text-gray-900">返回首页</a>
                        </div>
                        <div className="flex gap-6">
                            {menuItems.map((item) => (
                                <a key={item.id} href={item.href}
                                    className={`pb-2 text-sm font-medium ${
                                        currentPage === item.id
                                            ? 'border-b-2 border-green-500 text-green-600'
                                            : 'text-gray-600 hover:text-gray-900'
                                    }`}>
                                    {item.label}
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const SubscriptionManager = () => {
            const [subscriptions, setSubscriptions] = useState([]);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({
                name: '',
                url: '',
                enabled: true,
                auto_refresh: false,
                refresh_interval: 3600,
                description: ''
            });
            const [loading, setLoading] = useState(false);
            const [refreshing, setRefreshing] = useState(null);
            const [syncing, setSyncing] = useState(null);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);

            const loadSubscriptions = async () => {
                try {
                    const data = await api.get('/api/subscriptions');
                    setSubscriptions(data.data || []);
                } catch (err) {
                    setError(err.message);
                }
            };

            useEffect(() => { loadSubscriptions(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setSuccess(null);
                try {
                    if (editing) {
                        await api.put(`/api/subscriptions/${form.name}`, form);
                        setSuccess('订阅更新成功');
                    } else {
                        await api.post('/api/subscriptions', form);
                        setSuccess('订阅创建成功');
                    }
                    setEditing(null);
                    setForm({
                        name: '',
                        url: '',
                        enabled: true,
                        auto_refresh: false,
                        refresh_interval: 3600,
                        description: ''
                    });
                    loadSubscriptions();
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (name) => {
                if (!confirm('确定要删除这个订阅源吗？这将同时删除该订阅的所有节点。')) return;
                try {
                    await api.delete(`/api/subscriptions/${name}`);
                    loadSubscriptions();
                } catch (err) {
                    setError(err.message);
                }
            };

            const handleSync = async (name) => {
                setSyncing(name);
                setError(null);
                try {
                    const result = await api.post(`/api/subscriptions/${name}/sync`, {});
                    setSuccess(`订阅同步成功，获取到 ${result.data?.node_count || 0} 个节点`);
                    loadSubscriptions();
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(`同步失败: ${err.message}`);
                } finally {
                    setSyncing(null);
                }
            };

            const handleRefreshCache = async (name) => {
                setRefreshing(name);
                try {
                    await api.delete(`/api/cache/${name}`);
                    await loadSubscriptions();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setRefreshing(null);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Header currentPage="subscriptions" />

                    {error && (
                        <div className="max-w-4xl mx-auto px-6 mt-4">
                            <div className="p-4 bg-red-50 border border-red-200 rounded flex items-center justify-between">
                                <span className="text-red-700 text-sm">{error}</span>
                                <button onClick={() => setError(null)} className="text-red-500 hover:text-red-700"><Icons.X /></button>
                            </div>
                        </div>
                    )}

                    {success && (
                        <div className="max-w-4xl mx-auto px-6 mt-4">
                            <div className="p-4 bg-green-50 border border-green-200 rounded flex items-center justify-between">
                                <span className="text-green-700 text-sm flex items-center gap-2">
                                    <Icons.Check />{success}
                                </span>
                                <button onClick={() => setSuccess(null)} className="text-green-500 hover:text-green-700"><Icons.X /></button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto px-6 py-6 space-y-6">
                        <div className="bg-white rounded-lg shadow-sm border p-6">
                            <h2 className="text-lg font-semibold mb-4">{editing ? '编辑订阅源' : '新建订阅源'}</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1">名称</label>
                                    <input type="text" required disabled={!!editing} value={form.name}
                                        onChange={(e) => setForm({ ...form, name: e.target.value })}
                                        className="w-full px-3 py-2 input-base rounded text-sm" placeholder="my-subscription" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1">订阅地址</label>
                                    <input type="url" required value={form.url}
                                        onChange={(e) => setForm({ ...form, url: e.target.value })}
                                        className="w-full px-3 py-2 input-base rounded text-sm" placeholder="https://..." />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">描述</label>
                                        <textarea value={form.description}
                                            onChange={(e) => setForm({ ...form, description: e.target.value })}
                                            className="w-full px-3 py-2 input-base rounded text-sm" rows="2" placeholder="可选描述" />
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex items-center gap-4">
                                            <label className="flex items-center gap-2">
                                                <input type="checkbox" checked={form.enabled}
                                                    onChange={(e) => setForm({ ...form, enabled: e.target.checked })} className="w-4 h-4" />
                                                <span className="text-sm">启用订阅</span>
                                            </label>
                                            <label className="flex items-center gap-2">
                                                <input type="checkbox" checked={form.auto_refresh}
                                                    onChange={(e) => setForm({ ...form, auto_refresh: e.target.checked })} className="w-4 h-4" />
                                                <span className="text-sm">自动刷新</span>
                                            </label>
                                        </div>
                                        {form.auto_refresh && (
                                            <div>
                                                <label className="block text-sm font-medium mb-1">刷新间隔（秒）</label>
                                                <input type="number" value={form.refresh_interval}
                                                    onChange={(e) => setForm({ ...form, refresh_interval: parseInt(e.target.value) || 3600 })}
                                                    className="w-full px-3 py-2 input-base rounded text-sm" placeholder="3600" min="60" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button type="submit" disabled={loading}
                                        className="flex items-center gap-2 px-4 py-2 btn-primary rounded text-sm">
                                        <Icons.Save />{loading ? '保存中...' : (editing ? '更新' : '创建')}
                                    </button>
                                    {editing && (
                                        <button type="button" onClick={() => {
                                            setEditing(null);
                                            setForm({ name: '', url: '', enabled: true, auto_refresh: false, refresh_interval: 3600, description: '' });
                                            setError(null);
                                        }}
                                            className="px-4 py-2 btn-secondary rounded text-sm">取消</button>
                                    )}
                                </div>
                            </form>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm border overflow-hidden">
                            <div className="p-4 border-b flex items-center justify-between">
                                <h3 className="font-semibold">订阅源列表</h3>
                                <span className="text-sm text-gray-500">{subscriptions.length} 个订阅源</span>
                            </div>
                            <div className="divide-y">
                                {subscriptions.map((sub) => (
                                    <div key={sub.id} className="p-4">
                                        <div className="flex items-center justify-between">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="font-medium">{sub.name}</span>
                                                    <span className={`text-xs px-2 py-0.5 rounded-full ${sub.enabled ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                                        {sub.enabled ? '启用' : '禁用'}
                                                    </span>
                                                    {sub.auto_refresh && (
                                                        <span className="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">
                                                            自动刷新 ({sub.refresh_interval}s)
                                                        </span>
                                                    )}
                                                </div>
                                                {sub.description && <p className="text-sm text-gray-600 mb-2">{sub.description}</p>}
                                                <div className="text-xs text-gray-500">
                                                    节点数: {sub.node_count || 0} | 最后更新: {sub.last_fetched_at ? new Date(sub.last_fetched_at).toLocaleString() : '从未'}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => handleSync(sub.name)} disabled={syncing === sub.name}
                                                    className="p-2 hover:bg-blue-50 rounded text-blue-600" title="同步节点">
                                                    {syncing === sub.name ? (
                                                        <div className="animate-spin w-4 h-4 border-2 border-blue-300 border-t-blue-600 rounded-full" />
                                                    ) : <Icons.Sync />}
                                                </button>
                                                <button onClick={() => handleRefreshCache(sub.name)} disabled={refreshing === sub.name}
                                                    className="p-2 hover:bg-gray-100 rounded" title="清除缓存">
                                                    {refreshing === sub.name ? (
                                                        <div className="animate-spin w-4 h-4 border-2 border-gray-300 border-t-gray-600 rounded-full" />
                                                    ) : <Icons.Refresh />}
                                                </button>
                                                <button onClick={() => { setEditing(sub); setForm({ ...sub }); setError(null); }}
                                                    className="p-2 hover:bg-gray-100 rounded" title="编辑"><Icons.Edit /></button>
                                                <button onClick={() => handleDelete(sub.name)} className="p-2 hover:bg-red-50 rounded text-red-500" title="删除">
                                                    <Icons.Trash />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {subscriptions.length === 0 && (
                                    <div className="p-8 text-center text-gray-500">暂无订阅源，创建一个开始使用吧！</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SubscriptionManager />);
    </script>
</body>
</html>
