<section id="subscriptions-page" class="space-y-6">
    <header class="flex justify-end">
      <div class="flex flex-wrap items-center gap-2">
        <button
          type="button"
          data-action="refresh-all"
          id="subscriptions-refresh-all"
          class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-3.5 py-[7px] text-[13.5px] font-medium leading-[1.2] text-rf-text transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
        >
          刷新所有订阅源
        </button>
        <button
          type="button"
          data-action="create"
          class="inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-[7px] text-[13.5px] font-medium leading-[1.2] text-white transition hover:border-[#15b25a] hover:bg-[#15b25a]"
        >
          <svg class="h-[14px] w-[14px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新建订阅
        </button>
      </div>
    </header>

    <div id="subscriptions-content"></div>
    <div id="subscriptions-modal-root"></div>
    <div id="subscriptions-delete-root"></div>
    <div id="subscriptions-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('subscriptions-page');
      if (!root) return;

      const PROTOCOLS = ['vmess', 'vless', 'trojan', 'ss', 'anytls', 'hysteria2', 'tuic'];
      const contentEl = document.getElementById('subscriptions-content');
      const modalRoot = document.getElementById('subscriptions-modal-root');
      const deleteRoot = document.getElementById('subscriptions-delete-root');
      const toastRoot = document.getElementById('subscriptions-toast-root');
      const refreshAllButton = document.getElementById('subscriptions-refresh-all');

      const state = {
        subs: [],
        loading: true,
        modalMode: null,
        editItem: null,
        syncingId: null,
        bulkSyncing: false,
        saving: false,
        deleteTarget: null,
        deleting: false,
        filterOpen: true,
        form: defaultForm(),
        kwInput: '',
        toasts: [],
      };

      function defaultForm() {
        return {
          name: '',
          url: '',
          enabled: true,
          auto_refresh: false,
          refresh_interval: 3600,
          description: '',
          filter_rules: {
            exclude_keywords: [],
            exclude_regex: '',
            include_protocols: [],
          },
        };
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[char]);
      }

      function request(url, options = {}) {
        return fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        }).then(async (res) => {
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || `请求失败: ${res.status}`);
          }
          return res.json();
        });
      }

      function get(url) { return request(url); }
      function post(url, data) { return request(url, { method: 'POST', body: JSON.stringify(data) }); }
      function put(url, data) { return request(url, { method: 'PUT', body: JSON.stringify(data) }); }
      function del(url) { return request(url, { method: 'DELETE' }); }

      function addToast(message, type = 'ok') {
        const id = Date.now() + Math.random();
        state.toasts.push({ id, message, type });
        renderToasts();
        window.setTimeout(() => {
          state.toasts = state.toasts.filter((item) => item.id !== id);
          renderToasts();
        }, 3200);
      }

      function renderToasts() {
        toastRoot.innerHTML = state.toasts.map((toast) => `
          <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13.5px] font-medium shadow-rf3 ${toast.type === 'ok' ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-600'}">
            ${toast.type === 'ok' ? icons.check : icons.alert}
            <span>${escapeHtml(toast.message)}</span>
          </div>
        `).join('');
      }

      function formatTime(value) {
        if (!value) return '从未';
        try {
          return new Date(value).toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch (_) {
          return '未知';
        }
      }

      function formatGiB(bytes) {
        return `${(Number(bytes || 0) / (1024 ** 3)).toFixed(2)} GiB`;
      }

      function formatExpire(ts) {
        const d = new Date(Number(ts) * 1000);
        const dateStr = d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const daysLeft = Math.ceil((d - Date.now()) / 86400000);
        return daysLeft > 0 ? `${dateStr}（剩 ${daysLeft} 天）` : `${dateStr}（已过期）`;
      }

      async function copyText(text, label) {
        try {
          await navigator.clipboard.writeText(text);
          addToast(`${label}已复制到剪贴板`);
        } catch (_) {
          addToast('复制失败', 'err');
        }
      }

      function badge(tone, text, withDot = true) {
        const toneClass = {
          green: 'bg-green-100 text-green-700',
          blue: 'bg-blue-100 text-blue-600',
          red: 'bg-red-100 text-red-600',
          orange: 'bg-orange-100 text-orange-600',
          gray: 'bg-slate-100 text-slate-600',
        }[tone] || 'bg-slate-100 text-slate-600';
        const dotClass = {
          green: 'bg-green-600',
          blue: 'bg-blue-500',
          red: 'bg-red-500',
          orange: 'bg-orange-500',
          gray: 'bg-slate-500',
        }[tone] || 'bg-slate-500';
        return `
          <span class="inline-flex items-center gap-1 rounded-full px-[7px] py-[2px] text-[11.5px] font-medium whitespace-nowrap ${toneClass}">
            ${withDot ? `<span class="h-[5px] w-[5px] shrink-0 rounded-full ${dotClass}"></span>` : ''}
            ${escapeHtml(text)}
          </span>
        `;
      }

      function renderContent() {
        if (state.loading) {
          contentEl.innerHTML = `
            <div class="px-5 py-[60px] text-center text-rf-subtle">
              <div class="mx-auto mb-3 h-6 w-6 animate-spin rounded-full border-2 border-[#18c865] border-t-transparent"></div>
              <div class="text-[13px]">加载中...</div>
            </div>
          `;
          return;
        }

        if (state.subs.length === 0) {
          contentEl.innerHTML = `
            <div class="flex flex-col items-center justify-center px-5 py-14 text-center">
              <div class="mb-3.5 flex h-12 w-12 items-center justify-center rounded-[14px] bg-slate-100 text-rf-muted">
                ${icons.rssLarge}
              </div>
              <div class="mb-1.5 text-[15px] font-semibold text-rf-text">还没有订阅源</div>
              <div class="max-w-[280px] text-[13px] leading-6 text-rf-muted">点击“新建订阅”添加第一个订阅源，开始管理你的代理节点。</div>
              <button type="button" data-action="create" class="mt-4 inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-[7px] text-[13.5px] font-medium leading-[1.2] text-white transition hover:border-[#15b25a] hover:bg-[#15b25a]">
                ${icons.plus}
                新建订阅
              </button>
            </div>
          `;
          return;
        }

        contentEl.innerHTML = state.subs.map((sub) => {
          const userInfo = sub.userinfo || null;
          const used = userInfo ? Number(userInfo.upload || 0) + Number(userInfo.download || 0) : 0;
          const remaining = userInfo ? Math.max(Number(userInfo.total || 0) - used, 0) : 0;
          return `
            <article class="mb-3 flex items-start justify-between gap-4 rounded-rf-lg border border-rf-border bg-white px-5 py-4 shadow-rf1 transition hover:shadow-rf2">
              <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-2 text-[14.5px] font-semibold text-rf-text">
                  <span>${escapeHtml(sub.name)}</span>
                  ${sub.enabled ? badge('green', '启用') : badge('gray', '停用', false)}
                  ${sub.auto_refresh ? badge('blue', `自动刷新 ${sub.refresh_interval ? `${sub.refresh_interval}s` : ''}`) : ''}
                </div>
                ${sub.description ? `<div class="mt-1.5 text-[12.5px] leading-6 text-rf-muted">${escapeHtml(sub.description)}</div>` : ''}
                <div class="mt-2.5 flex flex-wrap items-center gap-x-3 gap-y-2 text-xs text-rf-subtle">
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.serverMini}${sub.node_count || 0} 个节点</span>
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.clockMini}最后同步：${escapeHtml(formatTime(sub.last_fetched_at))}</span>
                  <button type="button" data-action="copy-url" data-id="${sub.id}" class="flex max-w-[320px] items-center gap-[3px] overflow-hidden text-ellipsis whitespace-nowrap rounded-full bg-slate-100/80 px-2.5 py-1 text-left transition hover:bg-slate-200/70 hover:text-rf-text [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0" title="${escapeHtml(sub.url)}">
                    ${icons.linkMini}${escapeHtml(sub.url)}
                  </button>
                  ${userInfo ? `
                    <span class="flex items-center gap-[3px] text-blue-500 [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.uploadMini}已用 ${formatGiB(used)}</span>
                    <span class="flex items-center gap-[3px] text-emerald-600 [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.plusCircleMini}剩余 ${formatGiB(remaining)}</span>
                    ${userInfo.expire ? `<span class="flex items-center gap-[3px] text-orange-500 [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.calendarMini}${escapeHtml(formatExpire(userInfo.expire))}</span>` : ''}
                  ` : ''}
                </div>
              </div>
              <div class="flex shrink-0 items-center gap-[3px]">
                <button type="button" data-action="sync" data-id="${sub.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-blue-50 hover:text-blue-500 disabled:cursor-not-allowed disabled:opacity-50" title="同步节点" ${(state.syncingId === sub.id || state.bulkSyncing) ? 'disabled' : ''}>
                  ${state.syncingId === sub.id ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-current border-t-transparent text-blue-500"></span>' : icons.sync}
                </button>
                <button type="button" data-action="edit" data-id="${sub.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-slate-100 hover:text-rf-text" title="编辑">
                  ${icons.edit}
                </button>
                <button type="button" data-action="delete" data-id="${sub.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-red-50 hover:text-red-500" title="删除">
                  ${icons.trash}
                </button>
              </div>
            </article>
          `;
        }).join('');
      }

      function renderModal() {
        if (!state.modalMode) {
          modalRoot.innerHTML = '';
          return;
        }

        const form = state.form;
        const filterCount = (form.filter_rules.exclude_keywords.length || 0) + (form.filter_rules.include_protocols.length || 0) + (form.filter_rules.exclude_regex ? 1 : 0);

        modalRoot.innerHTML = `
          <div class="fixed inset-0 z-[200] flex items-center justify-center bg-black/45 p-5 backdrop-blur-[3px]" data-action="close-modal">
            <div class="max-h-[90vh] w-full max-w-[540px] overflow-y-auto rounded-rf-xl bg-white shadow-rf3" data-modal-card="true">
              <div class="sticky top-0 z-[1] flex items-center justify-between border-b border-rf-border bg-white px-[22px] py-[18px]">
                <span class="text-base font-semibold text-rf-text">${state.modalMode === 'edit' ? '编辑订阅源' : '新建订阅源'}</span>
                <button type="button" data-action="close-modal" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-slate-100 hover:text-rf-text">
                  ${icons.close}
                </button>
              </div>
              <form id="subscription-form">
                <div class="px-[22px] py-[22px]">
                  <div class="mb-3.5">
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">名称</label>
                    <input id="sub-name" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" type="text" required placeholder="例如：my-subscription" value="${escapeHtml(form.name)}">
                    <div class="mt-1 text-[11.5px] text-rf-muted">同步节点时会自动使用该名称作为前缀，例如 <code>${escapeHtml(form.name || 'my-subscription')}-节点A</code></div>
                  </div>

                  <div class="mb-3.5">
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">订阅地址</label>
                    <input id="sub-url" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" type="url" required placeholder="https://..." value="${escapeHtml(form.url)}">
                  </div>

                  <div class="mb-3.5">
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">描述 <span class="ml-1 text-[11px] font-normal text-rf-muted">可选</span></label>
                    <textarea id="sub-description" class="min-h-[72px] w-full resize-y rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] leading-6 text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" placeholder="对该订阅源的简要说明...">${escapeHtml(form.description)}</textarea>
                  </div>

                  <div class="mb-3.5 grid grid-cols-2 gap-3.5">
                    <div>
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">状态</label>
                      <label class="inline-flex cursor-pointer items-center gap-2 py-1">
                        <input id="sub-enabled" class="h-4 w-4 accent-emerald-500" type="checkbox" ${form.enabled ? 'checked' : ''}>
                        <span class="text-[13px] text-rf-text">启用订阅</span>
                      </label>
                    </div>
                    <div>
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">自动刷新</label>
                      <label class="inline-flex cursor-pointer items-center gap-2 py-1">
                        <input id="sub-auto-refresh" class="h-4 w-4 accent-emerald-500" type="checkbox" ${form.auto_refresh ? 'checked' : ''}>
                        <span class="text-[13px] text-rf-text">开启自动刷新</span>
                      </label>
                    </div>
                  </div>

                  ${form.auto_refresh ? `
                    <div class="mb-3.5">
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">刷新间隔 <span class="ml-1 text-[11px] font-normal text-rf-muted">秒</span></label>
                      <input id="sub-refresh-interval" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" type="number" min="60" value="${escapeHtml(form.refresh_interval)}">
                      <div class="mt-1 text-[11.5px] text-rf-muted">最短 60 秒，推荐 3600 秒（1 小时）</div>
                    </div>
                  ` : ''}
                </div>

                <div class="overflow-hidden rounded-rf border border-rf-border">
                  <button type="button" data-action="toggle-filter" class="flex w-full items-center justify-between border-none bg-slate-50 px-3 py-[9px] text-left text-[13px] font-medium text-rf-text">
                    <span class="flex items-center gap-1.5">
                      ${icons.filterMini}
                      节点过滤规则
                      ${filterCount > 0 ? `<span class="inline-flex items-center rounded-full bg-orange-100 px-[7px] py-[2px] text-[11px] font-medium text-orange-600">${filterCount} 条</span>` : ''}
                    </span>
                    <svg class="h-3 w-3 shrink-0 transition ${state.filterOpen ? 'rotate-180' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                  </button>
                  ${state.filterOpen ? `
                    <div class="flex flex-col gap-3 p-[14px_12px]">
                      <div>
                        <label class="mb-1.5 block text-[12.5px] font-medium text-rf-text">排除关键词 <span class="ml-1 text-[11px] font-normal text-rf-muted">节点名称含以下词时排除</span></label>
                        <input id="sub-kw-input" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" type="text" placeholder="输入关键词后按 Enter 添加" value="${escapeHtml(state.kwInput)}">
                        ${form.filter_rules.exclude_keywords.length > 0 ? `
                          <div class="mt-[7px] flex flex-wrap gap-[5px]">
                            ${form.filter_rules.exclude_keywords.map((kw) => `
                              <span class="inline-flex items-center gap-1 rounded-full bg-orange-100 px-2 py-[2px] text-xs text-orange-800">
                                ${escapeHtml(kw)}
                                <button type="button" data-action="remove-keyword" data-keyword="${escapeHtml(kw)}" class="inline-flex items-center border-none bg-transparent p-0 text-inherit">${icons.closeMini}</button>
                              </span>
                            `).join('')}
                          </div>
                        ` : ''}
                      </div>

                      <div>
                        <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">排除正则 <span class="ml-1 text-[11px] font-normal text-rf-muted">可选，匹配节点名称时排除</span></label>
                        <input id="sub-exclude-regex" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-2 text-[13.5px] text-rf-text outline-none transition placeholder:text-rf-subtle focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10" type="text" placeholder="例如：剩余|到期|官网" value="${escapeHtml(form.filter_rules.exclude_regex)}">
                      </div>

                      <div>
                        <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">协议白名单 <span class="ml-1 text-[11px] font-normal text-rf-muted">不选则全部保留</span></label>
                        <div class="mt-1 flex flex-wrap gap-2">
                          ${PROTOCOLS.map((protocol) => {
                            const checked = form.filter_rules.include_protocols.includes(protocol);
                            return `
                              <button
                                type="button"
                                data-action="toggle-protocol"
                                data-protocol="${protocol}"
                                class="inline-flex items-center rounded-full border px-[10px] py-1 text-[13px] transition ${checked ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-rf-border bg-white text-rf-muted'}"
                              >
                                ${escapeHtml(protocol)}
                              </button>
                            `;
                          }).join('')}
                        </div>
                      </div>
                    </div>
                  ` : ''}
                </div>

                <div class="flex justify-end gap-2 rounded-b-rf-xl border-t border-rf-border bg-slate-50 px-[22px] py-[14px]">
                  <button type="button" data-action="close-modal" class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-3.5 py-2 text-[13px] font-semibold text-rf-text transition hover:bg-slate-50">取消</button>
                  <button type="submit" class="inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-2 text-[13px] font-semibold text-white transition hover:border-[#15b25a] hover:bg-[#15b25a] disabled:cursor-not-allowed disabled:opacity-50" ${state.saving ? 'disabled' : ''}>
                    ${state.saving ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-white/35 border-t-transparent"></span>' : ''}
                    ${state.saving ? '保存中...' : state.modalMode === 'edit' ? '保存修改' : '创建订阅'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      function renderDeleteDialog() {
        if (!state.deleteTarget) {
          deleteRoot.innerHTML = '';
          return;
        }

        deleteRoot.innerHTML = `
          <div class="fixed inset-0 z-[210] flex items-center justify-center bg-black/45 p-5 backdrop-blur-[3px]" data-action="close-delete">
            <div class="max-h-[90vh] w-full max-w-[420px] overflow-y-auto rounded-rf-xl bg-white shadow-rf3" data-delete-card="true">
              <div class="sticky top-0 z-[1] flex items-center justify-between border-b border-rf-border bg-white px-[22px] py-[18px]">
                <span class="text-base font-semibold text-rf-text">确认删除</span>
                <button type="button" data-action="close-delete" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-slate-100 hover:text-rf-text">
                  ${icons.close}
                </button>
              </div>
              <div class="px-[22px] py-[22px]">
                <p class="text-[14px] leading-[1.7] text-rf-muted">
                  确定要删除订阅源 <strong class="text-rf-text">${escapeHtml(state.deleteTarget.name)}</strong> 吗？
                  此操作将同时删除该订阅的所有节点，且<strong class="text-red-500">不可恢复</strong>。
                </p>
              </div>
              <div class="flex justify-end gap-2 rounded-b-rf-xl border-t border-rf-border bg-slate-50 px-[22px] py-[14px]">
                <button type="button" data-action="close-delete" class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-3.5 py-2 text-[13px] font-semibold text-rf-text transition hover:bg-slate-50">取消</button>
                <button type="button" data-action="confirm-delete" class="inline-flex items-center gap-1.5 rounded-rf border border-red-500 bg-red-500 px-3.5 py-2 text-[13px] font-semibold text-white transition hover:bg-red-600 hover:border-red-600 disabled:cursor-not-allowed disabled:opacity-50" ${state.deleting ? 'disabled' : ''}>
                  ${state.deleting ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-white/35 border-t-transparent"></span>' : ''}
                  ${state.deleting ? '删除中...' : '确认删除'}
                </button>
              </div>
            </div>
          </div>
        `;
      }

      function renderAll() {
        renderHeaderActions();
        renderContent();
        renderModal();
        renderDeleteDialog();
        renderToasts();
      }

      function renderHeaderActions() {
        if (!refreshAllButton) return;
        refreshAllButton.disabled = state.bulkSyncing || !!state.syncingId || state.loading;
        refreshAllButton.innerHTML = state.bulkSyncing
          ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-current border-t-transparent"></span>刷新中...'
          : '刷新所有订阅源';
      }

      function syncFormFromDom() {
        if (!state.modalMode) return;
        const nameEl = document.getElementById('sub-name');
        const urlEl = document.getElementById('sub-url');
        const descEl = document.getElementById('sub-description');
        const enabledEl = document.getElementById('sub-enabled');
        const autoRefreshEl = document.getElementById('sub-auto-refresh');
        const refreshEl = document.getElementById('sub-refresh-interval');
        const kwEl = document.getElementById('sub-kw-input');
        const regexEl = document.getElementById('sub-exclude-regex');

        state.form.name = nameEl ? nameEl.value : state.form.name;
        state.form.url = urlEl ? urlEl.value : state.form.url;
        state.form.description = descEl ? descEl.value : state.form.description;
        state.form.enabled = enabledEl ? enabledEl.checked : state.form.enabled;
        state.form.auto_refresh = autoRefreshEl ? autoRefreshEl.checked : state.form.auto_refresh;
        state.form.refresh_interval = refreshEl ? Math.max(60, Number(refreshEl.value || 3600)) : state.form.refresh_interval;
        state.kwInput = kwEl ? kwEl.value : state.kwInput;
        state.form.filter_rules.exclude_regex = regexEl ? regexEl.value : state.form.filter_rules.exclude_regex;
      }

      function openCreate() {
        state.modalMode = 'create';
        state.editItem = null;
        state.saving = false;
        state.filterOpen = true;
        state.kwInput = '';
        state.form = defaultForm();
        renderModal();
      }

      function openEdit(item) {
        const filter = item.filter_rules || {};
        state.modalMode = 'edit';
        state.editItem = item;
        state.saving = false;
        state.filterOpen = true;
        state.kwInput = '';
        state.form = {
          name: item.name || '',
          url: item.url || '',
          enabled: item.enabled !== false,
          auto_refresh: !!item.auto_refresh,
          refresh_interval: item.refresh_interval || 3600,
          description: item.description || '',
          filter_rules: {
            exclude_keywords: Array.isArray(filter.exclude_keywords) ? [...filter.exclude_keywords] : [],
            exclude_regex: filter.exclude_regex || '',
            include_protocols: Array.isArray(filter.include_protocols) ? [...filter.include_protocols] : [],
          },
        };
        renderModal();
      }

      function closeModal() {
        state.modalMode = null;
        state.editItem = null;
        state.saving = false;
        state.kwInput = '';
        modalRoot.innerHTML = '';
      }

      async function loadSubs(options = {}) {
        const showLoading = options.showLoading !== false;
        if (showLoading) {
          state.loading = true;
          renderAll();
        }
        try {
          const res = await get('/api/subscriptions');
          state.subs = res.data || [];
        } catch (err) {
          addToast(`加载订阅列表失败：${err.message}`, 'err');
        } finally {
          if (showLoading) {
            state.loading = false;
          }
          renderAll();
        }
      }

      async function submitForm() {
        syncFormFromDom();
        state.saving = true;
        renderModal();
        try {
          if (state.modalMode === 'edit' && state.editItem) {
            await put(`/api/subscriptions/${state.editItem.id}`, state.form);
            addToast('订阅源更新成功');
          } else {
            await post('/api/subscriptions', state.form);
            addToast('订阅源创建成功');
          }
          closeModal();
          await loadSubs();
        } catch (err) {
          addToast(`${state.modalMode === 'edit' ? '更新失败' : '创建失败'}：${err.message}`, 'err');
          state.saving = false;
          renderModal();
        }
      }

      async function syncSubscription(id) {
        if (state.syncingId || state.bulkSyncing) return;
        state.syncingId = id;
        renderAll();
        try {
          const result = await post(`/api/subscriptions/${id}/sync`, {});
          addToast(`同步成功，获取到 ${result.data?.node_count || 0} 个节点`);
          await loadSubs({ showLoading: false });
        } catch (err) {
          addToast(`同步失败：${err.message}`, 'err');
        } finally {
          state.syncingId = null;
          renderAll();
        }
      }

      async function syncAllSubscriptions() {
        if (state.bulkSyncing || state.syncingId) return;
        state.bulkSyncing = true;
        renderAll();
        try {
          const result = await post('/api/subscriptions/sync', {});
          const data = result.data || {};
          const attempted = Number(data.attempted || 0);
          const succeeded = Number(data.succeeded || 0);
          const failed = Number(data.failed || 0);
          const skipped = Number(data.skipped || 0);
          const totalNodes = Number(data.total_nodes || 0);

          if (attempted === 0) {
            addToast('没有可刷新的订阅源');
          } else if (failed === 0) {
            addToast(`已刷新 ${succeeded} 个订阅源，共获取 ${totalNodes} 个节点`);
          } else {
            addToast(`批量刷新完成：成功 ${succeeded}，失败 ${failed}，跳过 ${skipped}`, 'err');
          }
          await loadSubs({ showLoading: false });
        } catch (err) {
          addToast(`批量刷新失败：${err.message}`, 'err');
        } finally {
          state.bulkSyncing = false;
          renderAll();
        }
      }

      async function confirmDelete() {
        if (!state.deleteTarget || state.deleting) return;
        state.deleting = true;
        renderDeleteDialog();
        try {
          await del(`/api/subscriptions/${state.deleteTarget.id}`);
          addToast('订阅源已删除');
          state.deleteTarget = null;
          state.deleting = false;
          renderDeleteDialog();
          await loadSubs();
        } catch (err) {
          addToast(`删除失败：${err.message}`, 'err');
          state.deleting = false;
          renderDeleteDialog();
        }
      }

      root.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const id = Number(button.dataset.id || 0);
        const item = state.subs.find((sub) => Number(sub.id) === id);

        if (action === 'create') {
          openCreate();
        } else if (action === 'refresh-all') {
          await syncAllSubscriptions();
        } else if (action === 'edit' && item) {
          openEdit(item);
        } else if (action === 'sync' && item) {
          await syncSubscription(item.id);
        } else if (action === 'delete' && item) {
          state.deleteTarget = item;
          state.deleting = false;
          renderDeleteDialog();
        } else if (action === 'copy-url' && item) {
          await copyText(item.url, '订阅地址');
        }
      });

      modalRoot.addEventListener('click', (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        const action = button.dataset.action;

        if (action === 'close-modal') {
          const card = event.target.closest('[data-modal-card]');
          if (!card || button !== card) {
            closeModal();
            return;
          }
        }

        if (action === 'toggle-filter') {
          syncFormFromDom();
          state.filterOpen = !state.filterOpen;
          renderModal();
          return;
        }

        if (action === 'remove-keyword') {
          syncFormFromDom();
          state.form.filter_rules.exclude_keywords = state.form.filter_rules.exclude_keywords.filter((kw) => kw !== button.dataset.keyword);
          renderModal();
          return;
        }

        if (action === 'toggle-protocol') {
          syncFormFromDom();
          const protocol = button.dataset.protocol;
          const list = state.form.filter_rules.include_protocols;
          state.form.filter_rules.include_protocols = list.includes(protocol)
            ? list.filter((item) => item !== protocol)
            : [...list, protocol];
          renderModal();
        }
      });

      modalRoot.addEventListener('keydown', (event) => {
        if (event.target && event.target.id === 'sub-kw-input' && event.key === 'Enter') {
          event.preventDefault();
          syncFormFromDom();
          const keyword = state.kwInput.trim();
          if (!keyword) return;
          if (!state.form.filter_rules.exclude_keywords.includes(keyword)) {
            state.form.filter_rules.exclude_keywords.push(keyword);
          }
          state.kwInput = '';
          renderModal();
        }
      });

      modalRoot.addEventListener('change', (event) => {
        if (event.target && (event.target.id === 'sub-enabled' || event.target.id === 'sub-auto-refresh')) {
          syncFormFromDom();
          renderModal();
        }
      });

      modalRoot.addEventListener('submit', (event) => {
        if (event.target && event.target.id === 'subscription-form') {
          event.preventDefault();
          submitForm();
        }
      });

      deleteRoot.addEventListener('click', (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        const action = button.dataset.action;
        if (action === 'close-delete') {
          state.deleteTarget = null;
          state.deleting = false;
          renderDeleteDialog();
        } else if (action === 'confirm-delete') {
          confirmDelete();
        }
      });

      const icons = {
        plus: '<svg class="h-[14px] w-[14px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>',
        rssLarge: '<svg class="h-[22px] w-[22px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle></svg>',
        serverMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>',
        clockMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>',
        linkMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>',
        uploadMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 6 1 22 23 22 23 6"></polyline><polyline points="1 10 23 10"></polyline><line x1="12" y1="6" x2="12" y2="2"></line><polyline points="8 6 12 2 16 6"></polyline></svg>',
        plusCircleMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
        calendarMini: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
        sync: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21h5v-5"></path></svg>',
        edit: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>',
        trash: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>',
        close: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>',
        closeMini: '<svg class="h-[11px] w-[11px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>',
        check: '<svg class="h-[14px] w-[14px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        alert: '<svg class="h-[16px] w-[16px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
        filterMini: '<svg class="h-[13px] w-[13px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>',
      };

      renderAll();
      loadSubs();
    })();
  </script>
