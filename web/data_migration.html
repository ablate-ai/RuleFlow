<section id="data-migration-page" class="flex min-h-0 flex-col gap-6 p-1">
  <div id="data-migration-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>

  <!-- 导出区域 -->
  <div class="rounded-rf-xl border border-rf-border bg-white p-6 shadow-rf">
    <h2 class="mb-1 text-[15px] font-semibold text-rf-text">导出数据</h2>
    <p class="mb-4 text-[13px] text-rf-muted">将当前所有订阅源、手动节点、模板、配置策略和规则源导出为 JSON 文件。</p>
    <button
      id="export-btn"
      type="button"
      class="inline-flex items-center gap-2 rounded-rf border border-[#18c865] bg-[#18c865] px-4 py-[8px] text-[13.5px] font-medium text-white transition hover:border-[#15b25a] hover:bg-[#15b25a] disabled:cursor-not-allowed disabled:opacity-60"
    >
      <svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span id="export-btn-text">导出数据</span>
    </button>
  </div>

  <!-- 导入区域 -->
  <div class="rounded-rf-xl border border-rf-border bg-white p-6 shadow-rf">
    <h2 class="mb-1 text-[15px] font-semibold text-rf-text">导入数据</h2>
    <p class="mb-4 text-[13px] text-rf-muted">选择之前导出的 JSON 文件，按名称 upsert 导入（已存在的记录将被更新，配置策略的访问 Token 保持不变）。</p>

    <div class="flex flex-wrap items-center gap-3">
      <label
        class="inline-flex cursor-pointer items-center gap-2 rounded-rf border border-rf-border bg-white px-4 py-[8px] text-[13.5px] font-medium text-rf-text transition hover:bg-slate-50"
        for="import-file-input"
      >
        <svg class="h-[15px] w-[15px] shrink-0 text-rf-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline>
        </svg>
        <span id="file-label">选择 JSON 文件</span>
      </label>
      <input id="import-file-input" type="file" accept=".json,application/json" class="hidden">

      <button
        id="import-btn"
        type="button"
        disabled
        class="inline-flex items-center gap-2 rounded-rf border border-[#18c865] bg-[#18c865] px-4 py-[8px] text-[13.5px] font-medium text-white transition hover:border-[#15b25a] hover:bg-[#15b25a] disabled:cursor-not-allowed disabled:opacity-60"
      >
        <svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span id="import-btn-text">开始导入</span>
      </button>
    </div>

    <!-- 导入结果 -->
    <div id="import-result" class="mt-5 hidden">
      <div class="mb-2 text-[13.5px] font-semibold text-rf-text">导入结果</div>
      <div class="overflow-x-auto rounded-rf border border-rf-border">
        <table class="w-full min-w-[440px] text-[13px]">
          <thead>
            <tr class="border-b border-rf-border bg-slate-50 text-left text-rf-muted">
              <th class="px-4 py-2.5 font-medium">类型</th>
              <th class="px-4 py-2.5 font-medium text-emerald-600">新建</th>
              <th class="px-4 py-2.5 font-medium text-sky-600">更新</th>
              <th class="px-4 py-2.5 font-medium text-slate-400">跳过</th>
              <th class="px-4 py-2.5 font-medium text-red-500">错误</th>
            </tr>
          </thead>
          <tbody id="import-result-body" class="divide-y divide-rf-border"></tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<script>
  (() => {
    const toastRoot = document.getElementById('data-migration-toast-root');
    const toasts = [];

    function renderToasts() {
      if (!toastRoot) return;
      toastRoot.innerHTML = toasts.map((t) => `
        <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13px] font-semibold shadow-rf2 ${t.type === 'ok' ? 'border-emerald-200 bg-emerald-50/90 text-emerald-700' : 'border-red-200 bg-red-50/95 text-red-700'}">
          ${t.type === 'ok'
            ? '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
            : '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>'}
          <span>${String(t.message ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}</span>
        </div>
      `).join('');
    }

    function toast(message, type = 'ok') {
      const id = Date.now() + Math.random();
      toasts.push({ id, message, type });
      renderToasts();
      setTimeout(() => {
        const idx = toasts.findIndex((t) => t.id === id);
        if (idx >= 0) toasts.splice(idx, 1);
        renderToasts();
      }, 3500);
    }

    // ---- 导出 ----
    const exportBtn = document.getElementById('export-btn');
    const exportBtnText = document.getElementById('export-btn-text');

    exportBtn.addEventListener('click', async () => {
      exportBtn.disabled = true;
      exportBtnText.textContent = '导出中…';
      try {
        const res = await fetch('/api/export', { method: 'GET' });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `请求失败: ${res.status}`);
        }
        // 从响应头获取文件名
        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="?([^";\n]+)"?/);
        const filename = match ? match[1] : 'ruleflow-export.json';

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('导出成功');
      } catch (err) {
        toast(err.message || '导出失败', 'err');
      } finally {
        exportBtn.disabled = false;
        exportBtnText.textContent = '导出数据';
      }
    });

    // ---- 导入 ----
    const fileInput = document.getElementById('import-file-input');
    const fileLabel = document.getElementById('file-label');
    const importBtn = document.getElementById('import-btn');
    const importBtnText = document.getElementById('import-btn-text');
    const importResult = document.getElementById('import-result');
    const importResultBody = document.getElementById('import-result-body');

    let selectedFile = null;

    fileInput.addEventListener('change', () => {
      selectedFile = fileInput.files[0] || null;
      fileLabel.textContent = selectedFile ? selectedFile.name : '选择 JSON 文件';
      importBtn.disabled = !selectedFile;
      importResult.classList.add('hidden');
    });

    const TYPE_LABELS = {
      subscriptions: '订阅源',
      manual_nodes: '手动节点',
      templates: '模板',
      config_policies: '配置策略',
      rule_sources: '规则源',
    };

    importBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      importBtn.disabled = true;
      importBtnText.textContent = '导入中…';
      importResult.classList.add('hidden');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch('/api/import', { method: 'POST', body: formData });
        const json = await res.json();
        if (!res.ok || !json.success) {
          throw new Error(json.error || `请求失败: ${res.status}`);
        }

        const data = json.data;
        importResultBody.innerHTML = Object.entries(TYPE_LABELS).map(([key, label]) => {
          const s = data[key] || {};
          return `<tr class="bg-white hover:bg-slate-50/60">
            <td class="px-4 py-2.5 font-medium text-rf-text">${label}</td>
            <td class="px-4 py-2.5 text-emerald-600 font-semibold">${s.created ?? 0}</td>
            <td class="px-4 py-2.5 text-sky-600 font-semibold">${s.updated ?? 0}</td>
            <td class="px-4 py-2.5 text-slate-400">${s.skipped ?? 0}</td>
            <td class="px-4 py-2.5 ${(s.errors ?? 0) > 0 ? 'text-red-500 font-semibold' : 'text-slate-300'}">${s.errors ?? 0}</td>
          </tr>`;
        }).join('');
        importResult.classList.remove('hidden');
        toast('导入完成');
      } catch (err) {
        toast(err.message || '导入失败', 'err');
      } finally {
        importBtn.disabled = false;
        importBtnText.textContent = '开始导入';
      }
    });
  })();
</script>
