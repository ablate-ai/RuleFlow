<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuleFlow - 控制台</title>
  <link rel="stylesheet" href="/web/shared/base.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --sh2: 0 8px 18px rgba(17,24,39,.08);
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #f7faf8 58%, #eefbf3 100%);
      border: 1px solid var(--bdr);
      border-radius: 20px;
      box-shadow: var(--sh2);
      padding: 24px;
      margin-bottom: 22px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }
    .hero-title { font-size: 28px; font-weight: 750; color: var(--t1); letter-spacing: -.04em; }
    .hero-sub { font-size: 14px; color: var(--t2); margin-top: 6px; max-width: 720px; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 600;
      border: 1px solid transparent;
      background: #fff;
    }
    .pill-dot { width: 8px; height: 8px; border-radius: 50%; }
    .pill-ok { color: #166534; background: #f0fdf4; border-color: #bbf7d0; }
    .pill-ok .pill-dot { background: #22c55e; }
    .pill-warn { color: var(--ylwt); background: var(--ylwbg); border-color: #fde68a; }
    .pill-warn .pill-dot { background: var(--ylw); }
    .pill-bad { color: var(--redt); background: var(--redbg); border-color: #fecaca; }
    .pill-bad .pill-dot { background: var(--red); }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: var(--rm); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all .15s; white-space: nowrap; line-height: 1.2; text-decoration: none; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn svg { width: 14px; height: 14px; }
    .btn-p { background: var(--grn); color: #fff; border-color: var(--grn); }
    .btn-p:hover:not(:disabled) { background: var(--grnd); border-color: var(--grnd); }
    .btn-s { background: #fff; color: var(--t1); border-color: var(--bdr); }
    .btn-s:hover:not(:disabled) { background: #f9fafb; }

    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 22px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--rl);
      padding: 18px;
      box-shadow: var(--sh1);
    }
    .stat-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .stat-ic { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-kicker { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
    .stat-v { font-size: 28px; font-weight: 750; color: var(--t1); letter-spacing: -.05em; line-height: 1; }
    .stat-l { font-size: 12.5px; color: var(--t2); margin-top: 4px; }
    .stat-note { font-size: 12px; color: var(--t3); margin-top: 10px; }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, .9fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    .card { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--rl); box-shadow: var(--sh1); }
    .card-h { padding: 16px 18px; border-bottom: 1px solid var(--bdr); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-ht { font-size: 15px; font-weight: 650; color: var(--t1); }
    .card-hs { font-size: 12.5px; color: var(--t3); }
    .card-b { padding: 18px; }

    .issue-list { display: grid; gap: 12px; }
    .issue-item {
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 14px 15px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      background: #fcfcfd;
    }
    .issue-main { min-width: 0; }
    .issue-title { font-size: 14px; font-weight: 650; color: var(--t1); }
    .issue-desc { font-size: 12.5px; color: var(--t2); margin-top: 4px; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }
    .tag-bad { background: var(--redbg); color: var(--redt); }
    .tag-warn { background: var(--ylwbg); color: var(--ylwt); }
    .tag-ok { background: #f0fdf4; color: #166534; }

    .sub-list { display: grid; gap: 10px; }
    .sub-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) 96px 92px 140px;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--bdr);
      background: #fff;
    }
    .sub-name { font-size: 13.5px; font-weight: 650; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sub-meta { font-size: 12px; color: var(--t3); margin-top: 4px; }
    .sub-cell { font-size: 12.5px; color: var(--t2); }

    .mini-grid { display: grid; gap: 12px; }
    .mini-stat {
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 14px;
      background: #fafafa;
    }
    .mini-label { font-size: 12px; color: var(--t3); }
    .mini-value { font-size: 22px; font-weight: 750; color: var(--t1); margin-top: 4px; letter-spacing: -.03em; }
    .mini-note { font-size: 12px; color: var(--t2); margin-top: 4px; }

    .breakdown { display: grid; gap: 10px; margin-top: 14px; }
    .break-item { display: grid; grid-template-columns: 92px 1fr 44px; gap: 10px; align-items: center; }
    .break-label { font-size: 12.5px; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .break-bar { height: 8px; background: #eef2f7; border-radius: 999px; overflow: hidden; }
    .break-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #22c55e, #16a34a); }
    .break-count { font-size: 12px; font-weight: 600; color: var(--t3); text-align: right; }

    .quick-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .quick-card {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--bdr);
      background: linear-gradient(180deg, #fff 0%, #fafafa 100%);
      text-decoration: none;
      color: inherit;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .quick-card:hover { transform: translateY(-1px); box-shadow: var(--sh2); }
    .quick-title { font-size: 14px; font-weight: 650; color: var(--t1); }
    .quick-desc { font-size: 12.5px; color: var(--t2); margin-top: 6px; }

    .empty {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      color: var(--t2);
      font-size: 13px;
      background: #fafafa;
    }
    .muted { color: var(--t3); }
    .skel {
      height: 28px;
      width: 72px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e5e7eb 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 1200px) {
      .stats, .quick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) { .hero { flex-direction: column; } }
    @media (max-width: 720px) {
      .stats, .quick-grid { grid-template-columns: 1fr; }
      .sub-row { grid-template-columns: 1fr; }
      .hero-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="/web/shared/components.js" data-presets="react"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const DAY_MS = 24 * 60 * 60 * 1000;

    function formatTime(value) {
      if (!value) return '从未同步';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '时间未知';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function formatAgo(value) {
      if (!value) return '从未同步';
      const date = new Date(value);
      const diff = Date.now() - date.getTime();
      if (Number.isNaN(diff)) return '时间未知';
      if (diff < 60 * 1000) return '刚刚';
      if (diff < 60 * 60 * 1000) return `${Math.floor(diff / (60 * 1000))} 分钟前`;
      if (diff < DAY_MS) return `${Math.floor(diff / (60 * 60 * 1000))} 小时前`;
      return `${Math.floor(diff / DAY_MS)} 天前`;
    }

    function buildIssueItems(subscriptions, templates, policies, health) {
      const issues = [];
      const now = Date.now();

      const failedSubs = subscriptions.filter(s => Boolean(s.last_fetch_error));
      if (failedSubs.length > 0) {
        issues.push({
          level: 'bad',
          title: `${failedSubs.length} 个订阅最近拉取失败`,
          desc: `优先检查 ${failedSubs.slice(0, 2).map(s => s.name).join('、')}${failedSubs.length > 2 ? ' 等订阅' : ''} 的 URL、鉴权或远端可达性。`,
        });
      }

      const staleSubs = subscriptions.filter(s => s.enabled && (!s.last_fetched_at || now - new Date(s.last_fetched_at).getTime() > DAY_MS));
      if (staleSubs.length > 0) {
        issues.push({
          level: failedSubs.length > 0 ? 'warn' : 'bad',
          title: `${staleSubs.length} 个启用订阅超过 24 小时未更新`,
          desc: '这些订阅可能已经过期，节点与流量信息不一定可信。',
        });
      }

      if (policies.filter(p => p.enabled).length === 0) {
        issues.push({
          level: 'warn',
          title: '当前没有启用的配置策略',
          desc: '即使订阅和节点正常，也无法稳定产出可供客户端使用的配置。',
        });
      }

      if (templates.length === 0) {
        issues.push({
          level: 'warn',
          title: '当前没有任何规则模板',
          desc: '建议至少准备一套模板，否则配置策略无法完整工作。',
        });
      }

      if (health && health.status && health.status !== 'healthy') {
        issues.push({
          level: 'bad',
          title: '系统健康状态不是 healthy',
          desc: `当前状态为 ${health.status}，请检查数据库或 Redis 连接。`,
        });
      }

      return issues.slice(0, 5);
    }

    function getSubStatus(sub) {
      if (sub.last_fetch_error) return { label: '失败', cls: 'tag-bad' };
      if (!sub.enabled)         return { label: '已停用', cls: 'tag-warn' };
      if (!sub.last_fetched_at) return { label: '未同步', cls: 'tag-warn' };
      if (Date.now() - new Date(sub.last_fetched_at).getTime() > DAY_MS)
                                return { label: '过旧', cls: 'tag-warn' };
      return { label: '正常', cls: 'tag-ok' };
    }

    /* ===== 子组件 ===== */

    const Skel = () => <div className="skel" />;

    const StatCard = ({ kicker, value, label, note, iconBg, icon, loaded }) => (
      <div className="stat">
        <div className="stat-top">
          <div>
            <div className="stat-kicker">{kicker}</div>
            <div className="stat-v">{loaded ? value : <Skel />}</div>
          </div>
          <div className="stat-ic" style={{ background: iconBg }}>{icon}</div>
        </div>
        <div className="stat-l">{label}</div>
        <div className="stat-note">{loaded ? note : '加载中'}</div>
      </div>
    );

    const IssueItem = ({ issue }) => (
      <div className="issue-item">
        <div className="issue-main">
          <div className="issue-title">{issue.title}</div>
          <div className="issue-desc">{issue.desc}</div>
        </div>
        <span className={`tag tag-${issue.level === 'bad' ? 'bad' : issue.level === 'warn' ? 'warn' : 'ok'}`}>
          {issue.level === 'bad' ? '高优先级' : issue.level === 'warn' ? '注意' : '正常'}
        </span>
      </div>
    );

    const SubRow = ({ sub }) => {
      const status = getSubStatus(sub);
      const detail = sub.last_fetch_error ? sub.last_fetch_error : `最近同步：${formatTime(sub.last_fetched_at)}`;
      return (
        <div className="sub-row">
          <div>
            <div className="sub-name">{sub.name}</div>
            <div className="sub-meta">{detail}</div>
          </div>
          <div className="sub-cell">{sub.node_count ?? 0} 节点</div>
          <div className="sub-cell">{sub.auto_refresh ? '自动刷新' : '手动'}</div>
          <div className="sub-cell">
            <span className={`tag ${status.cls}`}>{status.label}</span>{' '}
            <span className="muted">{formatAgo(sub.last_fetched_at)}</span>
          </div>
        </div>
      );
    };

    const BreakItem = ({ label, count, max }) => (
      <div className="break-item">
        <div className="break-label">{label}</div>
        <div className="break-bar">
          <div className="break-fill" style={{ width: `${Math.max((count / max) * 100, 6)}%` }} />
        </div>
        <div className="break-count">{count}</div>
      </div>
    );

    /* ===== 主应用 ===== */

    const App = () => {
      const [health, setHealth]             = useState(null);
      const [subscriptions, setSubscriptions] = useState([]);
      const [nodeStats, setNodeStats]       = useState({});
      const [templates, setTemplates]       = useState([]);
      const [policies, setPolicies]         = useState([]);
      const [lastUpdated, setLastUpdated]   = useState(null);
      const [loaded, setLoaded]             = useState(false);
      const [refreshing, setRefreshing]     = useState(false);

      const loadDashboard = useCallback(async () => {
        setRefreshing(true);
        try {
          const [h, subRes, nodeStatsRes, tplRes, policyRes] = await Promise.all([
            fetch('/health').then(r => r.ok ? r.json() : null).catch(() => null),
            fetch('/api/subscriptions').then(r => r.json()).catch(() => ({ data: [] })),
            fetch('/api/nodes/stats').then(r => r.json()).catch(() => ({ data: {} })),
            fetch('/api/templates').then(r => r.json()).catch(() => ({ data: [] })),
            fetch('/api/config-policies').then(r => r.json()).catch(() => ({ data: [] })),
          ]);
          setHealth(h);
          setSubscriptions(subRes.data || []);
          setNodeStats(nodeStatsRes.data || {});
          setTemplates(tplRes.data || []);
          setPolicies(policyRes.data || []);
          setLastUpdated(new Date());
        } finally {
          setLoaded(true);
          setRefreshing(false);
        }
      }, []);

      useEffect(() => { loadDashboard(); }, [loadDashboard]);

      /* 派生数据 */
      const enabledSubs    = subscriptions.filter(s => s.enabled).length;
      const failedSubs     = subscriptions.filter(s => Boolean(s.last_fetch_error));
      const staleSubs      = subscriptions.filter(s => s.enabled && (!s.last_fetched_at || Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS));
      const impactedCount  = new Set([...failedSubs.map(s => s.name), ...staleSubs.map(s => s.name)]).size;
      const totalNodes     = Number(nodeStats.total || 0);
      const enabledNodes   = Number(nodeStats.enabled || 0);
      const disabledNodes  = Math.max(totalNodes - enabledNodes, 0);
      const enabledPolicies = policies.filter(p => p.enabled).length;
      const sourceCount    = Object.keys(nodeStats.by_source || {}).length;
      const issues         = loaded ? buildIssueItems(subscriptions, templates, policies, health) : [];
      const displayIssues  = loaded && issues.length === 0
        ? [{ level: 'ok', title: '目前没有明显异常', desc: '服务、订阅、模板和策略都处于可继续工作的状态。' }]
        : issues;
      const protocolItems  = Object.entries(nodeStats.by_protocol || {}).sort((a, b) => b[1] - a[1]).slice(0, 6);
      const protocolMax    = Math.max(...protocolItems.map(([, c]) => c), 1);
      const templateTypes  = [...new Set(templates.map(t => t.target).filter(Boolean))].join(' / ');

      const sortedSubs = [...subscriptions].sort((a, b) => {
        const score = s => {
          if (s.last_fetch_error) return 0;
          if (!s.enabled) return 1;
          if (!s.last_fetched_at) return 2;
          if (Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS) return 3;
          return 4;
        };
        const d = score(a) - score(b);
        return d !== 0 ? d : new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
      }).slice(0, 6);

      const heroStatus = (() => {
        if (!loaded) return { cls: 'pill pill-ok', label: '正在检查服务状态' };
        if (health && health.status === 'healthy') return { cls: 'pill pill-ok', label: '服务运行正常' };
        if (health && health.status) return { cls: 'pill pill-warn', label: `系统状态：${health.status}` };
        return { cls: 'pill pill-bad', label: '服务状态获取失败' };
      })();

      const issueNoteText = (() => {
        if (!loaded) return '加载中';
        if (issues.length === 0) return '当前没有明显异常';
        if (impactedCount > 0) return `涉及 ${impactedCount} 个异常订阅及系统配置状态`;
        return '当前存在系统配置或健康状态问题';
      })();

      return (
        <div className="app">
          <Sidebar active="home" />
          <main className="main">

            {/* Hero */}
            <section className="hero">
              <div>
                <div className="hero-title">控制台</div>
                <div className="hero-sub">首页不再堆接口和入口，直接告诉你系统现在是否健康、哪些订阅异常、哪些资源不足，以及下一步最该处理什么。</div>
                <div className="hero-meta">
                  <div className={heroStatus.cls}>
                    <span className="pill-dot"></span>
                    <span>{heroStatus.label}</span>
                  </div>
                  <div className="pill">
                    <span>{lastUpdated ? `最后刷新：${formatTime(lastUpdated.toISOString())}` : '最后刷新：加载中'}</span>
                  </div>
                </div>
              </div>
              <div className="hero-actions">
                <button className="btn btn-p" disabled={refreshing} onClick={loadDashboard}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9A9 9 0 0 1 17 5l6 5"/><path d="M20.49 15A9 9 0 0 1 7 19l-6-5"/>
                  </svg>
                  刷新概览
                </button>
              </div>
            </section>

            {/* Stats */}
            <section className="stats">
              <StatCard
                loaded={loaded}
                kicker="订阅源"
                value={`${enabledSubs}/${subscriptions.length}`}
                label="启用订阅 / 全部订阅"
                note={subscriptions.length ? `${failedSubs.length} 个失败，${staleSubs.length} 个未及时更新` : '还没有订阅源'}
                iconBg="var(--grnbg)"
                icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--grn)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>}
              />
              <StatCard
                loaded={loaded}
                kicker="待处理"
                value={String(issues.length)}
                label="当前需要处理的问题项"
                note={issueNoteText}
                iconBg="var(--redbg)"
                icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>}
              />
              <StatCard
                loaded={loaded}
                kicker="节点可用性"
                value={`${enabledNodes}/${totalNodes}`}
                label="启用节点 / 总节点"
                note={totalNodes ? `禁用节点 ${disabledNodes} 个` : '还没有节点数据'}
                iconBg="var(--blubg)"
                icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blu)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>}
              />
              <StatCard
                loaded={loaded}
                kicker="配置能力"
                value={`${enabledPolicies}/${templates.length}`}
                label="启用策略 / 模板数"
                note={`${policies.length} 个策略，${templates.length} 个模板`}
                iconBg="var(--orgbg)"
                icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--org)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>}
              />
            </section>

            {/* 待处理事项 + 资源概览 */}
            <section className="grid">
              <div className="card">
                <div className="card-h">
                  <div>
                    <div className="card-ht">待处理事项</div>
                    <div className="card-hs">优先展示真正影响可用性的异常</div>
                  </div>
                </div>
                <div className="card-b">
                  <div className="issue-list">
                    {!loaded
                      ? <div className="empty">加载中...</div>
                      : displayIssues.map((issue, i) => <IssueItem key={i} issue={issue} />)
                    }
                  </div>
                </div>
              </div>

              <div className="card">
                <div className="card-h">
                  <div>
                    <div className="card-ht">资源概览</div>
                    <div className="card-hs">看整体是否够用，而不是看一堆接口路径</div>
                  </div>
                </div>
                <div className="card-b">
                  <div className="mini-grid">
                    <div className="mini-stat">
                      <div className="mini-label">模板数量</div>
                      <div className="mini-value">{loaded ? templates.length : '--'}</div>
                      <div className="mini-note">{loaded ? (templates.length ? `${templateTypes} 模板可用` : '尚未创建模板') : '加载中'}</div>
                    </div>
                    <div className="mini-stat">
                      <div className="mini-label">节点来源</div>
                      <div className="mini-value">{loaded ? sourceCount : '--'}</div>
                      <div className="mini-note">区分订阅导入与手动节点</div>
                    </div>
                  </div>
                  <div className="breakdown">
                    <div className="muted" style={{ fontSize: 12 }}>节点协议分布</div>
                    {!loaded
                      ? <div className="empty">加载中...</div>
                      : protocolItems.length === 0
                      ? <div className="empty">暂无节点协议数据</div>
                      : protocolItems.map(([label, count]) => (
                          <BreakItem key={label} label={label} count={count} max={protocolMax} />
                        ))
                    }
                  </div>
                </div>
              </div>
            </section>

            {/* 订阅状态 + 快捷操作 */}
            <section className="grid" style={{ marginBottom: 22 }}>
              <div className="card">
                <div className="card-h">
                  <div>
                    <div className="card-ht">订阅状态</div>
                    <div className="card-hs">先看最近同步和错误，不看装饰信息</div>
                  </div>
                  <a href="/subscriptions" className="btn btn-s">进入订阅管理</a>
                </div>
                <div className="card-b">
                  <div className="sub-list">
                    {!loaded
                      ? <div className="empty">加载中...</div>
                      : sortedSubs.length === 0
                      ? <div className="empty">还没有订阅源，先去创建一个可同步的订阅。</div>
                      : sortedSubs.map(sub => <SubRow key={sub.id} sub={sub} />)
                    }
                  </div>
                </div>
              </div>

              <div className="card">
                <div className="card-h">
                  <div>
                    <div className="card-ht">快捷操作</div>
                    <div className="card-hs">常用动作保留，但不再抢主视线</div>
                  </div>
                </div>
                <div className="card-b">
                  <div className="quick-grid">
                    <a href="/subscriptions" className="quick-card">
                      <div className="quick-title">订阅源</div>
                      <div className="quick-desc">新增订阅、手动同步、排查拉取失败</div>
                    </a>
                    <a href="/nodes" className="quick-card">
                      <div className="quick-title">节点管理</div>
                      <div className="quick-desc">筛选禁用节点，查看协议和来源分布</div>
                    </a>
                    <a href="/configs" className="quick-card">
                      <div className="quick-title">配置策略</div>
                      <div className="quick-desc">确认启用策略是否足够，补齐 token 配置</div>
                    </a>
                    <a href="/templates" className="quick-card">
                      <div className="quick-title">规则模板</div>
                      <div className="quick-desc">维护 Clash、Stash、Surge 模板内容</div>
                    </a>
                  </div>
                </div>
              </div>
            </section>

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
