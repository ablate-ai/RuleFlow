<style>
    .dashboard-card {
      transition: all 0.3s ease;
      border: 1px solid var(--bdr);
      border-radius: 8px;
      background: white;
      box-shadow: var(--sh1);
    }
    .dashboard-card:hover {
      box-shadow: var(--sh2);
      border-color: var(--grn);
      transform: translateY(-1px);
    }
    .stat-number {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
      color: var(--t1);
      letter-spacing: -0.02em;
    }
    .stat-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t3);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.healthy { background: var(--grn); }
    .status-dot.warning { background: var(--ylw); }
    .status-dot.error { background: var(--red); }
    .progress-bar {
      height: 3px;
      background: var(--bdr);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--grn), var(--grnd));
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    .metric-card {
      padding: 12px;
      border-radius: 8px;
      background: white;
      border: 1px solid var(--bdr);
      transition: all 0.3s ease;
    }
    .metric-card:hover {
      box-shadow: var(--sh2);
      transform: translateY(-1px);
    }
    .metric-icon {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .metric-icon.subscriptions { background: rgba(24, 200, 101, 0.1); color: var(--grn); }
    .metric-icon.nodes { background: rgba(59, 130, 246, 0.1); color: var(--blu); }
    .metric-icon.policies { background: rgba(249, 115, 22, 0.1); color: var(--org); }
    .metric-icon.templates { background: rgba(139, 92, 246, 0.1); color: var(--pur); }
  </style>
<section id="dashboard-page" class="space-y-4">
    <!-- Hero Section -->
    <div class="relative overflow-hidden rounded-[12px] border border-rf-border bg-gradient-to-br from-white via-[#f7faf8] to-[#eefbf3] px-3 py-3 shadow-[0_8px_18px_rgba(17,24,39,.08)]">
      <div class="pointer-events-none absolute right-[-48px] top-[-48px] h-[180px] w-[180px] rounded-full bg-[radial-gradient(circle,rgba(24,200,101,0.14)_0%,rgba(24,200,101,0)_72%)]"></div>
      <div class="relative z-10">
        <h1 class="text-xl font-bold tracking-[-0.04em] text-rf-text">控制台</h1>
        <p class="mt-1 max-w-[720px] text-[11px] leading-4 text-rf-muted">集中查看订阅、节点、配置策略和缓存健康度。优先暴露异常订阅和协议分布，减少进入各页面才发现问题的情况。</p>
        <div id="dashboard-hero-meta" class="mt-2 flex flex-wrap gap-1.5"></div>
      </div>
    </div>

    <div id="dashboard-content"></div>
    <div id="dashboard-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('dashboard-page');
      if (!root) return;

      const DAY_MS = 24 * 60 * 60 * 1000;
      const contentEl = document.getElementById('dashboard-content');
      const heroMetaEl = document.getElementById('dashboard-hero-meta');
      const toastRoot = document.getElementById('dashboard-toast-root');

      const TOOL_LINKS = [
        {
          name: 'IP 检测',
          description: '快速确认当前出口 IP、地区和 ASN 信息。',
          url: 'https://ip.skk.moe/',
        },
        {
          name: 'DNS 泄漏检测',
          description: '检查 DNS 请求是否按预期走代理或指定解析链路。',
          url: 'https://browserleaks.com/dns',
        },
      ];

      const state = {
        health: null,
        subscriptions: [],
        nodeStats: {},
        templates: [],
        policies: [],
        lastUpdated: null,
        loaded: false,
        refreshing: false,
        expandedIds: [],
        toasts: [],
      };

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[char]);
      }

      function request(url, options = {}) {
        return fetch(url, options).then(async (res) => {
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || ('请求失败: ' + res.status));
          }
          return res.json();
        });
      }

      function safeRequest(url, options) {
        return request(url, options).catch(() => null);
      }

      function addToast(message, type = 'ok') {
        const id = Date.now() + Math.random();
        state.toasts.push({ id, message, type });
        renderToasts();
        window.setTimeout(() => {
          state.toasts = state.toasts.filter((item) => item.id !== id);
          renderToasts();
        }, 3200);
      }

      function renderToasts() {
        toastRoot.innerHTML = state.toasts.map((toast) => `
          <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13.5px] font-medium shadow-rf3 ${toast.type === 'ok' ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-600'}">
            ${toast.type === 'ok' ? icons.check : icons.alert}
            <span>${escapeHtml(toast.message)}</span>
          </div>
        `).join('');
      }

      function formatTime(value) {
        if (!value) return '从未同步';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '时间未知';
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0') + ' ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
      }

      function formatAgo(value) {
        if (!value) return '从未同步';
        const date = new Date(value);
        const diff = Date.now() - date.getTime();
        if (Number.isNaN(diff)) return '时间未知';
        if (diff < 60 * 1000) return '刚刚';
        if (diff < 60 * 60 * 1000) return Math.floor(diff / (60 * 1000)) + ' 分钟前';
        if (diff < DAY_MS) return Math.floor(diff / (60 * 60 * 1000)) + ' 小时前';
        return Math.floor(diff / DAY_MS) + ' 天前';
      }

      function getSubStatus(sub) {
        if (sub.last_fetch_error) return { label: '失败', tone: 'red' };
        if (!sub.enabled) return { label: '已停用', tone: 'yellow' };
        if (!sub.last_fetched_at) return { label: '未同步', tone: 'yellow' };
        if (Date.now() - new Date(sub.last_fetched_at).getTime() > DAY_MS) return { label: '过旧', tone: 'yellow' };
        return { label: '正常', tone: 'green' };
      }

      function heroStatus() {
        if (!state.loaded) return { tone: 'gray', label: '正在检查服务状态' };
        if (state.health && state.health.status === 'healthy') return { tone: 'green', label: '服务运行正常' };
        if (state.health && state.health.status) return { tone: 'yellow', label: '系统状态：' + state.health.status };
        return { tone: 'red', label: '服务状态获取失败' };
      }

      function derive() {
        const enabledSubs = state.subscriptions.filter((s) => s.enabled).length;
        const failedSubs = state.subscriptions.filter((s) => Boolean(s.last_fetch_error));
        const staleSubs = state.subscriptions.filter((s) => s.enabled && (!s.last_fetched_at || Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS));
        const totalNodes = Number(state.nodeStats.total || 0);
        const enabledNodes = Number(state.nodeStats.enabled || 0);
        const disabledNodes = Math.max(totalNodes - enabledNodes, 0);
        const enabledPolicies = state.policies.filter((p) => p.enabled).length;
        const sourceCount = Object.keys(state.nodeStats.by_source || {}).length;
        const protocolItems = Object.entries(state.nodeStats.by_protocol || {}).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const protocolMax = Math.max(...protocolItems.map((item) => item[1]), 1);
        const templateTypes = [...new Set(state.templates.map((t) => t.target).filter(Boolean))].join(' / ');
        const sortedSubs = state.subscriptions.slice().sort((a, b) => {
          const score = (s) => {
            if (s.last_fetch_error) return 0;
            if (!s.enabled) return 1;
            if (!s.last_fetched_at) return 2;
            if (Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS) return 3;
            return 4;
          };
          const delta = score(a) - score(b);
          if (delta !== 0) return delta;
          return new Date(b.updated_at || 0).getTime() - new Date(a.updated_at || 0).getTime();
        });
        return {
          enabledSubs,
          failedSubs,
          staleSubs,
          totalNodes,
          enabledNodes,
          disabledNodes,
          enabledPolicies,
          sourceCount,
          protocolItems,
          protocolMax,
          templateTypes,
          sortedSubs,
        };
      }

      function renderHeroMeta() {
        const hero = heroStatus();
        const heroToneClass = hero.tone === 'green'
          ? 'border-green-200 bg-green-50 text-green-700'
          : hero.tone === 'yellow'
            ? 'border-yellow-200 bg-yellow-50 text-yellow-700'
            : hero.tone === 'red'
              ? 'border-red-200 bg-red-50 text-red-600'
              : 'border-rf-border bg-white text-rf-text';
        const heroDotClass = hero.tone === 'green'
          ? 'bg-green-500'
          : hero.tone === 'yellow'
            ? 'bg-yellow-500'
            : hero.tone === 'red'
              ? 'bg-red-500'
              : 'bg-slate-400';
        heroMetaEl.innerHTML = `
          <span class="inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1.5 text-[11px] font-semibold shadow-sm ${heroToneClass}">
            <span class="h-2 w-2 shrink-0 rounded-full ${heroDotClass}"></span>
            <span>${escapeHtml(hero.label)}</span>
          </span>
          <span class="inline-flex items-center gap-1.5 rounded-full border border-rf-border bg-white/85 px-2.5 py-1.5 text-[11px] font-medium text-rf-muted shadow-sm">${state.lastUpdated ? '最后刷新：' + escapeHtml(formatTime(state.lastUpdated.toISOString())) : '最后刷新：加载中'}</span>
        `;
      }

      function renderContent() {
        renderHeroMeta();
        const d = derive();
        contentEl.innerHTML = `
          <!-- 核心指标卡片 -->
          <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
            <div class="metric-card">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <span class="stat-label">订阅源</span>
                  <div class="stat-number mt-1">${state.loaded ? d.enabledSubs + '/' + state.subscriptions.length : '...'}</div>
                  <div class="mt-1 text-xs text-rf-muted">启用 / 全部订阅</div>
                  <div class="mt-0.5 text-xs text-rf-subtle">
                    ${state.subscriptions.length
                      ? (d.failedSubs.length > 0 ? `<span class="text-red-500">${d.failedSubs.length} 个失败</span>` : '') +
                        (d.staleSubs.length > 0 ? `，${d.staleSubs.length} 个未及时更新` : '')
                      : '还没有订阅源'
                    }
                  </div>
                </div>
                <div class="metric-icon subscriptions">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle>
                  </svg>
                </div>
              </div>
            </div>

            <div class="metric-card">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <span class="stat-label">节点可用性</span>
                  <div class="stat-number mt-1">${state.loaded ? d.enabledNodes + '/' + d.totalNodes : '...'}</div>
                  <div class="mt-1 text-xs text-rf-muted">启用节点 / 总节点</div>
                  <div class="mt-0.5 text-xs text-rf-subtle">
                    ${d.totalNodes
                      ? `${d.sourceCount} 个来源，${d.disabledNodes} 个禁用`
                      : '还没有节点数据'}
                  </div>
                </div>
                <div class="metric-icon nodes">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line>
                  </svg>
                </div>
              </div>
            </div>

            <div class="metric-card">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <span class="stat-label">配置策略</span>
                  <div class="stat-number mt-2">${state.loaded ? d.enabledPolicies + '/' + state.policies.length : '...'}</div>
                  <div class="mt-2 text-sm text-rf-muted">启用策略 / 全部策略</div>
                  <div class="mt-1 text-xs text-rf-subtle">
                    ${state.policies.length
                      ? `${state.templates.length} 个模板`
                      : '还没有配置策略'}
                  </div>
                </div>
                <div class="metric-icon policies">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06-.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                  </svg>
                </div>
              </div>
            </div>

            <div class="metric-card">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <span class="stat-label">规则模板</span>
                  <div class="stat-number mt-1">${state.loaded ? state.templates.length : '...'}</div>
                  <div class="mt-1 text-xs text-rf-muted">可用模板数量</div>
                  <div class="mt-0.5 text-xs text-rf-subtle">
                    ${state.templates.length
                      ? `${d.templateTypes.split(' / ').length} 种类型`
                      : '还没有规则模板'}
                  </div>
                </div>
                <div class="metric-icon templates">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- 订阅状态 -->
          <div class="mt-4 dashboard-card">
            <div class="flex items-center justify-between gap-3 border-b border-rf-border px-4 py-3">
              <div>
                <div class="text-base font-semibold text-rf-text">订阅状态</div>
                <div class="mt-1 text-xs text-rf-subtle">显示源名称、流量、过期时间和更新时间</div>
              </div>
              <a href="/subscriptions" class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-2.5 py-1.5 text-xs font-medium text-rf-text transition hover:bg-slate-50">进入订阅管理</a>
            </div>
            <div class="px-4 py-3">
              ${!state.loaded ? `
                <div class="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-xs text-rf-muted">加载中...</div>
              ` : d.sortedSubs.length === 0 ? `
                <div class="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-xs text-rf-muted">还没有订阅源，先去创建一个可同步的订阅。</div>
              ` : `
                <div class="space-y-1">
                  ${d.sortedSubs.map((sub) => {
                    const status = getSubStatus(sub);
                    const userInfo = sub.userinfo || null;
                    const used = userInfo ? Number(userInfo.upload || 0) + Number(userInfo.download || 0) : 0;
                    const total = userInfo ? Number(userInfo.total || 0) : 0;
                    const remaining = userInfo ? Math.max(total - used, 0) : 0;
                    const usedGiB = (used / (1024 ** 3)).toFixed(2);
                    const totalGiB = (total / (1024 ** 3)).toFixed(2);
                    const remainingGiB = (remaining / (1024 ** 3)).toFixed(2);
                    const expireDate = userInfo && userInfo.expire ? new Date(Number(userInfo.expire) * 1000) : null;
                    const expireStr = expireDate ? expireDate.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + '（剩 ' + Math.ceil((expireDate - Date.now()) / 86400000) + ' 天）' : '无';
                    return `
                      <article class="flex items-center justify-between gap-3 rounded-lg border border-rf-border bg-white px-3 py-2">
                        <div class="min-w-0 flex-1">
                          <div class="flex items-center gap-1.5 text-xs font-semibold text-rf-text">
                            <span class="truncate">${escapeHtml(sub.name)}</span>
                            <span class="inline-flex rounded-full ${status.tone === 'green' ? 'bg-green-100 text-green-700' : status.tone === 'red' ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-700'} px-1.5 py-0.5 text-[10px] font-bold">${status.label}</span>
                          </div>
                          <div class="mt-0.5 flex flex-wrap items-center gap-2 text-[11px] text-rf-subtle">
                            <span>更新于 ${formatAgo(sub.last_fetched_at)}</span>
                            <span>${sub.node_count ?? 0} 节点</span>
                          </div>
                        </div>
                        <div class="text-right text-[11px] text-rf-muted">
                          ${userInfo ? `
                            <div>已用 ${usedGiB} GiB</div>
                            <div>剩余 ${remainingGiB} GiB</div>
                            <div>总计 ${totalGiB} GiB</div>
                          ` : '无流量信息'}
                        </div>
                        <div class="text-right text-[11px] text-rf-muted">
                          ${expireStr}
                        </div>
                      </article>
                    `;
                  }).join('')}
                </div>
              `}
            </div>
          </div>

          <!-- 节点协议分布 -->
          <div class="mt-4 dashboard-card">
            <div class="border-b border-rf-border px-4 py-3">
              <div class="text-base font-semibold text-rf-text">节点协议分布</div>
              <div class="mt-1 text-xs text-rf-subtle">查看不同协议的节点数量</div>
            </div>
            <div class="px-4 py-3">
              ${!state.loaded ? `
                <div class="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-xs text-rf-muted">加载中...</div>
              ` : d.protocolItems.length === 0 ? `
                <div class="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-xs text-rf-muted">暂无节点协议数据</div>
              ` : `
                <div class="grid gap-3">
                  ${d.protocolItems.map((item) => `
                    <div class="grid grid-cols-[minmax(0,112px)_1fr_44px] items-center gap-1.5">
                      <div class="truncate text-xs font-medium text-rf-muted">${escapeHtml(item[0])}</div>
                      <div class="progress-bar">
                        <div class="progress-fill" style="width:${Math.max((item[1] / d.protocolMax) * 100, 6)}%"></div>
                      </div>
                      <div class="text-right text-xs font-semibold text-rf-subtle">${item[1]}</div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
          </div>

          <!-- 常用工具 -->
          <div class="mt-4 dashboard-card">
            <div class="border-b border-rf-border px-4 py-3">
              <div class="text-base font-semibold text-rf-text">常用工具 URL</div>
              <div class="mt-1 text-xs text-rf-subtle">辅助检查工具，不属于核心业务指标</div>
            </div>
            <div class="px-4 py-3">
              <div class="grid gap-3 md:grid-cols-2">
                ${TOOL_LINKS.map((item) => `
                  <a href="${item.url}" target="_blank" rel="noreferrer" class="block rounded-lg border border-rf-border bg-white px-3 py-2.5 transition hover:border-[#18c865] hover:shadow-[0_8px_18px_rgba(17,24,39,.05)]">
                    <div class="flex items-start justify-between gap-3">
                      <div>
                        <div class="text-xs font-semibold text-rf-text">${escapeHtml(item.name)}</div>
                        <div class="mt-0.5 text-[11px] text-rf-muted">${escapeHtml(item.description)}</div>
                      </div>
                      <span class="inline-flex rounded-full bg-slate-100 px-1.5 py-0.5 text-[10px] font-bold text-slate-600">工具</span>
                    </div>
                    <div class="mt-1.5 break-all text-[11px] text-blue-500">${escapeHtml(item.url)}</div>
                  </a>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }

      async function loadDashboard(showToast) {
        state.refreshing = true;
        updateRefreshButton();
        try {
          const [h, subRes, nodeStatsRes, tplRes, policyRes] = await Promise.all([
            safeRequest('/health'),
            safeRequest('/api/subscriptions'),
            safeRequest('/api/nodes/stats'),
            safeRequest('/api/templates'),
            safeRequest('/api/config-policies'),
          ]);
          state.health = h;
          state.subscriptions = (subRes && subRes.data) || [];
          state.nodeStats = (nodeStatsRes && nodeStatsRes.data) || {};
          state.templates = (tplRes && tplRes.data) || [];
          state.policies = (policyRes && policyRes.data) || [];
          state.lastUpdated = new Date();
          state.loaded = true;
          if (showToast) addToast('概览数据已刷新');
        } catch (err) {
          addToast('刷新失败：' + err.message, 'err');
        } finally {
          state.refreshing = false;
          updateRefreshButton();
          renderContent();
        }
      }

      async function handleRefresh() {
        try {
          await request('/api/cache/policies/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        } catch (_) {}
        await loadDashboard(true);
      }

      function updateRefreshButton() {
      }

      async function copyPolicyLink(policy) {
        const url = window.location.origin + '/subscribe?token=' + policy.token;
        try {
          await navigator.clipboard.writeText(url);
          addToast('订阅链接已复制');
        } catch (_) {
          addToast('复制失败', 'err');
        }
      }

      root.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;
        if (action === 'refresh') await handleRefresh();
        if (action === 'toggle-sub') {
          const id = Number(target.dataset.id);
          state.expandedIds = state.expandedIds.includes(id)
            ? state.expandedIds.filter((item) => item.id !== id)
            : state.expandedIds.concat(id);
          renderContent();
        }
        if (action === 'copy-policy-link') {
          const id = Number(target.dataset.id);
          const policy = state.policies.find((item) => item.id === id);
          if (policy) await copyPolicyLink(policy);
        }
      });

      const icons = {
        check: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        alert: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>',
      };

      window.__RULEFLOW_DASHBOARD_REFRESH__ = handleRefresh;

      renderToasts();
      renderContent();
      loadDashboard(false);
    })();
  </script>
