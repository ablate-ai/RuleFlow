<style>
    .dashboard-card {
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      border: 1px solid var(--bdr);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--sh1);
      backdrop-filter: blur(18px);
    }
    .dashboard-card:hover {
      box-shadow: var(--sh2);
      border-color: var(--bdr-strong);
      transform: translateY(-1px);
    }
    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--t1);
      letter-spacing: -0.05em;
    }
    .stat-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--t3);
    }
    .progress-bar {
      height: 5px;
      background: var(--bdr);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--grn);
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    .metric-card {
      padding: 10px 14px;
      border-radius: 14px;
      background: transparent;
      border: 0;
      transition: none;
      min-height: auto;
      display: flex;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      width: auto;
      gap: 8px;
      white-space: nowrap;
      line-height: 1;
    }
    .metric-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 10px;
      padding: 6px 8px;
      border: 1px solid var(--bdr);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--sh1);
      backdrop-filter: blur(18px);
    }
    .metric-sep {
      width: 1px;
      align-self: stretch;
      background: var(--bdr);
    }
    .dashboard-section-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--t1);
    }
    .dashboard-muted {
      color: var(--t3);
    }
  </style>
<section id="dashboard-page" class="space-y-3">
    <div id="dashboard-hero-meta" class="flex flex-wrap justify-end gap-2"></div>

    <div id="dashboard-content"></div>
    <div id="dashboard-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('dashboard-page');
      if (!root) return;

      const DAY_MS = 24 * 60 * 60 * 1000;
      const contentEl = document.getElementById('dashboard-content');
      const heroMetaEl = document.getElementById('dashboard-hero-meta');
      const toastRoot = document.getElementById('dashboard-toast-root');

      const TOOL_LINKS = [
        {
          name: '订阅转换',
          description: '将任意订阅链接转换为 Clash / Stash / Surge / Sing-Box 格式。',
          url: '/converter',
        },
        {
          name: 'IP 检测',
          description: '快速确认当前出口 IP、地区和 ASN 信息。',
          url: 'https://ip.skk.moe/',
        },
        {
          name: 'DNS 泄漏检测',
          description: '检查 DNS 请求是否按预期走代理或指定解析链路。',
          url: 'https://browserleaks.com/dns',
        },
      ];

      const state = {
        health: null,
        subscriptions: [],
        nodeStats: {},
        templates: [],
        policies: [],
        lastUpdated: null,
        loaded: false,
        refreshing: false,
        expandedIds: [],
        toasts: [],
      };

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[char]);
      }

      function request(url, options = {}) {
        return fetch(url, options).then(async (res) => {
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || ('请求失败: ' + res.status));
          }
          return res.json();
        });
      }

      function safeRequest(url, options) {
        return request(url, options).catch(() => null);
      }

      function addToast(message, type = 'ok') {
        const id = Date.now() + Math.random();
        state.toasts.push({ id, message, type });
        renderToasts();
        window.setTimeout(() => {
          state.toasts = state.toasts.filter((item) => item.id !== id);
          renderToasts();
        }, 3200);
      }

      function renderToasts() {
        toastRoot.innerHTML = state.toasts.map((toast) => `
          <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13.5px] font-medium shadow-rf3 ${toast.type === 'ok' ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-600'}">
            ${toast.type === 'ok' ? icons.check : icons.alert}
            <span>${escapeHtml(toast.message)}</span>
          </div>
        `).join('');
      }

      function formatTime(value) {
        if (!value) return '从未同步';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '时间未知';
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0') + ' ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
      }

      function formatAgo(value) {
        if (!value) return '从未同步';
        const date = new Date(value);
        const diff = Date.now() - date.getTime();
        if (Number.isNaN(diff)) return '时间未知';
        if (diff < 60 * 1000) return '刚刚';
        if (diff < 60 * 60 * 1000) return Math.floor(diff / (60 * 1000)) + ' 分钟前';
        if (diff < DAY_MS) return Math.floor(diff / (60 * 60 * 1000)) + ' 小时前';
        return Math.floor(diff / DAY_MS) + ' 天前';
      }

      function getSubStatus(sub) {
        if (sub.last_fetch_error) return { label: '失败', tone: 'red' };
        if (!sub.enabled) return { label: '已停用', tone: 'yellow' };
        if (!sub.last_fetched_at) return { label: '未同步', tone: 'yellow' };
        if (Date.now() - new Date(sub.last_fetched_at).getTime() > DAY_MS) return { label: '过旧', tone: 'yellow' };
        return { label: '正常', tone: 'green' };
      }

      function heroStatus() {
        if (!state.loaded) return { tone: 'gray', label: '正在检查服务状态' };
        if (state.health && state.health.status === 'healthy') return { tone: 'green', label: '服务运行正常' };
        if (state.health && state.health.status) return { tone: 'yellow', label: '系统状态：' + state.health.status };
        return { tone: 'red', label: '服务状态获取失败' };
      }

      function formatTraffic(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return '0 GiB';
        return (bytes / (1024 ** 3)).toFixed(1) + ' GiB';
      }

      function getExpireMeta(userInfo) {
        if (!userInfo || !userInfo.expire) return { label: '未提供到期时间', tone: 'slate' };
        const expireAt = new Date(Number(userInfo.expire) * 1000);
        if (Number.isNaN(expireAt.getTime())) return { label: '到期时间未知', tone: 'slate' };
        const remainDays = Math.ceil((expireAt.getTime() - Date.now()) / DAY_MS);
        const dayText = remainDays >= 0 ? '剩 ' + remainDays + ' 天' : '已过期 ' + Math.abs(remainDays) + ' 天';
        return {
          label: expireAt.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' · ' + dayText,
          tone: remainDays < 0 ? 'red' : remainDays <= 7 ? 'yellow' : 'green',
        };
      }

      function derive() {
        const enabledSubs = state.subscriptions.filter((s) => s.enabled).length;
        const failedSubs = state.subscriptions.filter((s) => Boolean(s.last_fetch_error));
        const staleSubs = state.subscriptions.filter((s) => s.enabled && (!s.last_fetched_at || Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS));
        const healthySubs = state.subscriptions.filter((s) => getSubStatus(s).tone === 'green');
        const attentionSubs = state.subscriptions.filter((s) => getSubStatus(s).tone !== 'green');
        const totalNodes = Number(state.nodeStats.total || 0);
        const enabledNodes = Number(state.nodeStats.enabled || 0);
        const disabledNodes = Math.max(totalNodes - enabledNodes, 0);
        const enabledPolicies = state.policies.filter((p) => p.enabled).length;
        const sourceCount = Object.keys(state.nodeStats.by_source || {}).length;
        const protocolItems = Object.entries(state.nodeStats.by_protocol || {}).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const protocolMax = Math.max(...protocolItems.map((item) => item[1]), 1);
        const templateTypes = [...new Set(state.templates.map((t) => t.target).filter(Boolean))].join(' / ');
        const sortedSubs = state.subscriptions.slice().sort((a, b) => {
          const score = (s) => {
            if (s.last_fetch_error) return 0;
            if (!s.enabled) return 1;
            if (!s.last_fetched_at) return 2;
            if (Date.now() - new Date(s.last_fetched_at).getTime() > DAY_MS) return 3;
            return 4;
          };
          const delta = score(a) - score(b);
          if (delta !== 0) return delta;
          return new Date(b.updated_at || 0).getTime() - new Date(a.updated_at || 0).getTime();
        });
        return {
          enabledSubs,
          failedSubs,
          staleSubs,
          healthySubs,
          attentionSubs,
          totalNodes,
          enabledNodes,
          disabledNodes,
          enabledPolicies,
          sourceCount,
          protocolItems,
          protocolMax,
          templateTypes,
          sortedSubs,
        };
      }

      function renderHeroMeta() {
        const hero = heroStatus();
        const heroToneClass = hero.tone === 'green'
          ? 'border-green-200 bg-green-50 text-green-700'
          : hero.tone === 'yellow'
            ? 'border-yellow-200 bg-yellow-50 text-yellow-700'
            : hero.tone === 'red'
              ? 'border-red-200 bg-red-50 text-red-600'
              : 'border-rf-border bg-white text-rf-text';
        const heroDotClass = hero.tone === 'green'
          ? 'bg-green-500'
          : hero.tone === 'yellow'
            ? 'bg-yellow-500'
            : hero.tone === 'red'
              ? 'bg-red-500'
              : 'bg-slate-400';
        heroMetaEl.innerHTML = `
          <span class="inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1.5 text-[11px] font-semibold shadow-sm ${heroToneClass}">
            <span class="h-2 w-2 shrink-0 rounded-full ${heroDotClass}"></span>
            <span>${escapeHtml(hero.label)}</span>
          </span>
          <span class="inline-flex items-center gap-1.5 rounded-full border border-rf-border bg-white/85 px-2.5 py-1.5 text-[11px] font-medium text-rf-muted shadow-sm">${state.lastUpdated ? '最后刷新：' + escapeHtml(formatTime(state.lastUpdated.toISOString())) : '最后刷新：加载中'}</span>
        `;
      }

      function renderContent() {
        renderHeroMeta();
        const d = derive();
        contentEl.innerHTML = `
          <div class="metric-strip">
            <div class="metric-card">
              <span class="stat-label">订阅源</span>
              <span class="stat-number">${state.loaded ? d.enabledSubs + '/' + state.subscriptions.length : '...'}</span>
            </div>
            <span class="metric-sep" aria-hidden="true"></span>

            <div class="metric-card">
              <span class="stat-label">节点可用性</span>
              <span class="stat-number">${state.loaded ? d.enabledNodes + '/' + d.totalNodes : '...'}</span>
            </div>
            <span class="metric-sep" aria-hidden="true"></span>

            <div class="metric-card">
              <span class="stat-label">配置策略</span>
              <span class="stat-number">${state.loaded ? d.enabledPolicies + '/' + state.policies.length : '...'}</span>
            </div>
            <span class="metric-sep" aria-hidden="true"></span>

            <div class="metric-card">
              <span class="stat-label">规则模板</span>
              <span class="stat-number">${state.loaded ? state.templates.length : '...'}</span>
            </div>
          </div>

          <div class="mt-4 grid gap-3 xl:grid-cols-[minmax(0,1.85fr)_minmax(260px,0.7fr)]">
            <div class="dashboard-card p-4">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="dashboard-section-title">订阅状态</div>
                  <div class="mt-0.5 text-[12px] dashboard-muted">优先展示异常和需要关注的订阅源。</div>
                </div>
                <div class="text-[11.5px] text-rf-subtle">${state.loaded ? `${d.healthySubs.length} 正常 / ${d.attentionSubs.length} 关注` : '加载中'}</div>
              </div>
              <div class="mt-3">
                <div class="rounded-[16px] border border-rf-border bg-white/80 px-3.5 py-3">
                  <div class="text-[11px] font-semibold uppercase tracking-[0.12em] text-rf-subtle">协议类型</div>
                  <div class="mt-1.5 text-[12px] leading-6 text-rf-muted">${state.loaded && d.protocolItems.length ? d.protocolItems.map((item) => `${escapeHtml(item[0])} ${item[1]}`).join(' · ') : '暂无协议统计'}</div>
                </div>
              </div>
              <div class="mt-3">
                ${!state.loaded ? `
                  <div class="rounded-[16px] border border-dashed border-slate-300 bg-white/70 px-4 py-8 text-center text-[13px] text-rf-muted">加载中...</div>
                ` : d.sortedSubs.length === 0 ? `
                  <div class="rounded-[16px] border border-dashed border-slate-300 bg-white/70 px-4 py-8 text-center text-[13px] text-rf-muted">还没有订阅源</div>
                ` : `
                  <div class="space-y-2.5">
                    ${d.sortedSubs.map((sub) => {
                      const status = getSubStatus(sub);
                      const userInfo = sub.userinfo || null;
                      const used = userInfo ? Number(userInfo.upload || 0) + Number(userInfo.download || 0) : 0;
                      const total = userInfo ? Number(userInfo.total || 0) : 0;
                      const remaining = userInfo ? Math.max(total - used, 0) : 0;
                      const usagePercent = total > 0 ? Math.min((used / total) * 100, 100) : 0;
                      const statusClass = status.tone === 'green'
                        ? 'bg-emerald-50 text-emerald-700 border-emerald-100'
                        : status.tone === 'red'
                          ? 'bg-red-50 text-red-600 border-red-100'
                          : 'bg-amber-50 text-amber-700 border-amber-100';
                      const expireMeta = getExpireMeta(userInfo);
                      return `
                        <article class="rounded-[18px] border border-rf-border bg-white/86 px-4 py-3.5 shadow-rf1">
                          <div class="flex flex-col gap-2.5 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0 flex-1">
                              <div class="flex flex-wrap items-center gap-2 text-[13.5px] font-semibold text-rf-text">
                                <span class="truncate">${escapeHtml(sub.name)}</span>
                                <span class="inline-flex rounded-full border px-2 py-1 text-[11px] font-semibold ${statusClass}">${status.label}</span>
                              </div>
                              <div class="mt-1.5 flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[11.5px] text-rf-subtle">
                                <span>更新于 ${formatAgo(sub.last_fetched_at)}</span>
                                <span>${sub.node_count ?? 0} 节点</span>
                                <span>${sub.enabled ? '已启用' : '已停用'}</span>
                                <span>${escapeHtml(expireMeta.label)}</span>
                              </div>
                            </div>
                            <div class="min-w-[190px] text-[11.5px] text-rf-muted lg:text-right">
                              ${userInfo ? `
                                <div>已用 ${formatTraffic(used)} / 剩余 ${formatTraffic(remaining)}</div>
                                <div class="mt-0.5">总量 ${formatTraffic(total)} · ${usagePercent.toFixed(0)}%</div>
                              ` : `
                                <div>无流量信息</div>
                              `}
                            </div>
                          </div>
                          ${userInfo ? `
                            <div class="progress-bar mt-2.5">
                              <div class="progress-fill" style="width:${usagePercent.toFixed(2)}%"></div>
                            </div>
                          ` : ''}
                          ${sub.last_fetch_error ? `
                            <div class="mt-2.5 rounded-[14px] bg-red-50 px-3 py-2 text-[11.5px] text-red-600">同步失败：${escapeHtml(sub.last_fetch_error)}</div>
                          ` : ''}
                        </article>
                      `;
                    }).join('')}
                  </div>
                `}
              </div>
            </div>

            <div class="space-y-3">
              <div class="dashboard-card p-4">
                <div class="dashboard-section-title">常用工具</div>
                <div class="mt-0.5 text-[12px] dashboard-muted">用于排查出口、DNS 与访问链路。</div>
                <div class="mt-3 grid gap-2.5">
                  ${TOOL_LINKS.map((item) => `
                    <a href="${item.url}" target="_blank" rel="noreferrer" class="block rounded-[16px] border border-rf-border bg-white/82 px-3.5 py-3 transition hover:shadow-rf1">
                      <div class="flex items-start justify-between gap-3">
                        <div>
                          <div class="text-[13px] font-semibold text-rf-text">${escapeHtml(item.name)}</div>
                          <div class="mt-0.5 text-[11.5px] leading-5 text-rf-muted">${escapeHtml(item.description)}</div>
                        </div>
                        <span class="inline-flex rounded-full bg-slate-100 px-2 py-1 text-[10px] font-semibold text-slate-600">工具</span>
                      </div>
                      <div class="mt-1.5 break-all text-[11.5px] text-rf-blue">${escapeHtml(item.url)}</div>
                    </a>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      async function loadDashboard(showToast) {
        state.refreshing = true;
        updateRefreshButton();
        try {
          const [h, subRes, nodeStatsRes, tplRes, policyRes] = await Promise.all([
            safeRequest('/health'),
            safeRequest('/api/subscriptions'),
            safeRequest('/api/nodes/stats'),
            safeRequest('/api/templates'),
            safeRequest('/api/config-policies'),
          ]);
          state.health = h;
          state.subscriptions = (subRes && subRes.data) || [];
          state.nodeStats = (nodeStatsRes && nodeStatsRes.data) || {};
          state.templates = (tplRes && tplRes.data) || [];
          state.policies = (policyRes && policyRes.data) || [];
          state.lastUpdated = new Date();
          state.loaded = true;
          if (showToast) addToast('概览数据已刷新');
        } catch (err) {
          addToast('刷新失败：' + err.message, 'err');
        } finally {
          state.refreshing = false;
          updateRefreshButton();
          renderContent();
        }
      }

      async function handleRefresh() {
        try {
          await request('/api/cache/policies/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        } catch (_) {}
        await loadDashboard(true);
      }

      function updateRefreshButton() {
      }

      async function copyPolicyLink(policy) {
        const url = window.location.origin + '/subscribe?token=' + policy.token;
        try {
          await navigator.clipboard.writeText(url);
          addToast('订阅链接已复制');
        } catch (_) {
          addToast('复制失败', 'err');
        }
      }

      root.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;
        if (action === 'refresh') await handleRefresh();
        if (action === 'toggle-sub') {
          const id = Number(target.dataset.id);
          state.expandedIds = state.expandedIds.includes(id)
            ? state.expandedIds.filter((item) => item.id !== id)
            : state.expandedIds.concat(id);
          renderContent();
        }
        if (action === 'copy-policy-link') {
          const id = Number(target.dataset.id);
          const policy = state.policies.find((item) => item.id === id);
          if (policy) await copyPolicyLink(policy);
        }
      });

      const icons = {
        check: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        alert: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>',
      };

      window.__RULEFLOW_DASHBOARD_REFRESH__ = handleRefresh;

      renderToasts();
      renderContent();
      loadDashboard(false);
    })();
  </script>
