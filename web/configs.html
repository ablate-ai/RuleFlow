<section id="configs-page" class="space-y-6">
    <header class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-[22px] font-bold tracking-[-0.4px] text-rf-text">订阅配置</h1>
        <p class="mt-0.5 text-[13px] text-rf-muted">管理配置策略，生成专属订阅链接</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <button
          type="button"
          data-action="create"
          class="inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-[7px] text-[13.5px] font-medium leading-[1.2] text-white transition hover:border-[#15b25a] hover:bg-[#15b25a]"
        >
          <svg class="h-[14px] w-[14px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新建策略
        </button>
      </div>
    </header>

    <div id="configs-content"></div>
    <div id="configs-modal-root"></div>
    <div id="configs-delete-root"></div>
    <div id="configs-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('configs-page');
      if (!root) return;

      const contentEl = document.getElementById('configs-content');
      const modalRoot = document.getElementById('configs-modal-root');
      const deleteRoot = document.getElementById('configs-delete-root');
      const toastRoot = document.getElementById('configs-toast-root');

      const state = {
        policies: [],
        subscriptions: [],
        templates: [],
        manualNodes: [],
        loading: true,
        modalOpen: false,
        editItem: null,
        deleteTarget: null,
        saving: false,
        deleting: false,
        refreshingId: null,
        form: defaultForm(),
        toasts: [],
      };

      function defaultForm() {
        return {
          name: '',
          target: 'clash-meta',
          subscription_ids: [],
          node_ids: [],
          template_name: '',
          description: '',
          enabled: true,
        };
      }

      function request(url, options = {}) {
        return fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        }).then(async (res) => {
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || ('请求失败: ' + res.status));
          }
          return res.json();
        });
      }

      function get(url) { return request(url); }
      function post(url, data) { return request(url, { method: 'POST', body: JSON.stringify(data) }); }
      function put(url, data) { return request(url, { method: 'PUT', body: JSON.stringify(data) }); }
      function del(url) { return request(url, { method: 'DELETE' }); }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[char]);
      }

      function badge(tone, text, withDot = true) {
        const toneClass = {
          green: 'bg-green-100 text-green-700',
          blue: 'bg-blue-100 text-blue-600',
          red: 'bg-red-100 text-red-600',
          orange: 'bg-orange-100 text-orange-600',
          purple: 'bg-violet-100 text-violet-700',
          cyan: 'bg-cyan-100 text-cyan-700',
          gray: 'bg-slate-100 text-slate-600',
        }[tone] || 'bg-slate-100 text-slate-600';
        const dotClass = {
          green: 'bg-green-600',
          blue: 'bg-blue-500',
          red: 'bg-red-500',
          orange: 'bg-orange-500',
          purple: 'bg-violet-500',
          cyan: 'bg-cyan-500',
          gray: 'bg-slate-500',
        }[tone] || 'bg-slate-500';
        return `
          <span class="inline-flex items-center gap-1 rounded-full px-[7px] py-[2px] text-[11.5px] font-medium whitespace-nowrap ${toneClass}">
            ${withDot ? `<span class="h-[5px] w-[5px] shrink-0 rounded-full ${dotClass}"></span>` : ''}
            ${escapeHtml(text)}
          </span>
        `;
      }

      function targetMeta(target) {
        const map = {
          'clash-meta': ['Clash Meta', 'blue'],
          stash: ['Stash', 'purple'],
          surge: ['Surge', 'orange'],
          'sing-box': ['sing-box', 'cyan'],
        };
        return map[target] || [target || '未知', 'gray'];
      }

      function addToast(message, type = 'ok') {
        const id = Date.now() + Math.random();
        state.toasts.push({ id, message, type });
        renderToasts();
        window.setTimeout(() => {
          state.toasts = state.toasts.filter((item) => item.id !== id);
          renderToasts();
        }, 3200);
      }

      function renderToasts() {
        toastRoot.innerHTML = state.toasts.map((toast) => `
          <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13.5px] font-medium shadow-rf3 ${toast.type === 'ok' ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-600'}">
            ${toast.type === 'ok' ? icons.check : icons.alert}
            <span>${escapeHtml(toast.message)}</span>
          </div>
        `).join('');
      }

      function formatDate(value) {
        if (!value) return '从未';
        try {
          return new Date(value).toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch (_) {
          return '未知';
        }
      }

      function formatPreview(items, emptyText) {
        if (!Array.isArray(items) || items.length === 0) return emptyText;
        if (items.length <= 3) return items.join('、');
        return items.slice(0, 3).join('、') + ' 等 ' + items.length + ' 个';
      }

      function getManualNodeNames(nodeIDs) {
        const ids = new Set((nodeIDs || []).map(Number));
        return state.manualNodes.filter((node) => ids.has(Number(node.id))).map((node) => node.name);
      }

      function getPolicyURL(policy) {
        return window.location.origin + '/subscribe?token=' + policy.token;
      }

      async function copyText(text, successMessage) {
        try {
          await navigator.clipboard.writeText(text);
          addToast(successMessage || '已复制到剪贴板');
        } catch (_) {
          addToast('复制失败', 'err');
        }
      }

      function openTemplateEditor(templateName) {
        if (!templateName) return;
        const tpl = state.templates.find((item) => item.name === templateName);
        if (!tpl) {
          addToast('未找到模板：' + templateName, 'err');
          return;
        }
        const url = new URL('/templates', window.location.origin);
        url.searchParams.set('edit', String(tpl.id));
        url.searchParams.set('return_to', window.location.pathname + window.location.search + window.location.hash);
        window.location.href = url.toString();
      }

      function syncFormFromDom() {
        const formEl = modalRoot.querySelector('form');
        if (!formEl) return;
        state.form.name = formEl.querySelector('[name="name"]')?.value || '';
        state.form.target = formEl.querySelector('[name="target"]')?.value || 'clash-meta';
        state.form.description = formEl.querySelector('[name="description"]')?.value || '';
        state.form.template_name = formEl.querySelector('[name="template_name"]')?.value || '';
        state.form.enabled = !!formEl.querySelector('[name="enabled"]')?.checked;
      }

      function filteredTemplates() {
        return state.templates.filter((tpl) => {
          if (state.form.target === 'surge') return tpl.target === 'surge';
          if (state.form.target === 'sing-box') return tpl.target === 'sing_box';
          return tpl.target !== 'surge' && tpl.target !== 'sing_box';
        });
      }

      function renderContent() {
        if (state.loading) {
          contentEl.innerHTML = `
            <div class="rounded-rf-lg border border-rf-border bg-white px-5 py-[56px] text-center shadow-rf1">
              <div class="mx-auto mb-3 h-6 w-6 animate-spin rounded-full border-2 border-[#18c865] border-t-transparent"></div>
              <div class="text-[13px] text-rf-muted">加载中...</div>
            </div>
          `;
          return;
        }

        if (state.policies.length === 0) {
          contentEl.innerHTML = `
            <div class="rounded-rf-lg border border-rf-border bg-white shadow-rf1">
              <div class="flex flex-col items-center justify-center px-5 py-14 text-center">
                <div class="mb-3.5 flex h-12 w-12 items-center justify-center rounded-[14px] bg-slate-100 text-rf-muted">${icons.settingsBig}</div>
                <div class="mb-1.5 text-[15px] font-semibold text-rf-text">暂无订阅配置</div>
                <div class="max-w-[280px] text-[13px] leading-6 text-rf-muted">创建一个配置策略，生成专属的订阅链接。</div>
                <button type="button" data-action="create" class="mt-4 inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-[7px] text-[13.5px] font-medium leading-[1.2] text-white transition hover:border-[#15b25a] hover:bg-[#15b25a]">
                  ${icons.plus}
                  新建策略
                </button>
              </div>
            </div>
          `;
          return;
        }

        contentEl.innerHTML = state.policies.map((policy) => {
          const manualNodeIDs = (policy.node_ids || []).map(Number);
          const manualNodeNames = getManualNodeNames(manualNodeIDs);
          const manualSummary = manualNodeIDs.length === 0
            ? ''
            : (manualNodeNames.length > 0 ? '手动节点：' + formatPreview(manualNodeNames, '无手动节点') : '手动节点：已选 ' + manualNodeIDs.length + ' 个');
          const target = targetMeta(policy.target);
          return `
            <article class="mb-2 flex items-start justify-between gap-3.5 rounded-rf-lg border border-rf-border bg-white px-[18px] py-[14px] shadow-rf1 transition hover:shadow-rf2">
              <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-[7px] text-[14.5px] font-semibold text-rf-text">
                  <span>${escapeHtml(policy.name)}</span>
                  ${policy.enabled ? badge('green', '启用') : badge('red', '禁用')}
                  ${badge(target[1], target[0])}
                </div>
                ${policy.description ? `<div class="mt-1 text-[12.5px] leading-[1.5] text-rf-muted">${escapeHtml(policy.description)}</div>` : ''}
                <div class="mt-[7px] flex flex-wrap items-center gap-3 text-xs text-rf-subtle">
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.rssMini}${(policy.subscription_ids || []).length > 0 ? (policy.subscription_ids || []).length + ' 个订阅源' : '无订阅源'}</span>
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0" title="${escapeHtml(manualNodeNames.join('\n'))}">${icons.listMini}${manualSummary || '无手动节点'}</span>
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">
                    ${icons.tagMini}
                    模板：
                    ${policy.template_name ? `<button type="button" data-action="edit-template" data-template="${escapeHtml(policy.template_name)}" class="border-none bg-transparent p-0 text-left text-blue-500 transition hover:text-blue-700 hover:underline">${escapeHtml(policy.template_name)}</button>` : '默认'}
                  </span>
                  <span class="flex items-center gap-[3px] [&_svg]:h-[11px] [&_svg]:w-[11px] [&_svg]:shrink-0">${icons.clockMini}最近访问：${escapeHtml(formatDate(policy.last_accessed_at))}</span>
                </div>
              </div>
              <div class="flex shrink-0 items-center gap-[3px]">
                <button type="button" data-action="copy-link" data-id="${policy.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-green-50 hover:text-[#18c865]" title="复制配置链接">${icons.copy}</button>
                <button type="button" data-action="open-link" data-id="${policy.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-blue-50 hover:text-blue-500" title="新标签页打开">${icons.link}</button>
                <button type="button" data-action="clear-cache" data-id="${policy.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-slate-100 hover:text-rf-text disabled:cursor-not-allowed disabled:opacity-50" title="清除配置缓存" ${state.refreshingId === policy.id ? 'disabled' : ''}>
                  ${state.refreshingId === policy.id ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-current border-t-transparent"></span>' : icons.refresh}
                </button>
                <button type="button" data-action="edit" data-id="${policy.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-blue-50 hover:text-blue-500" title="编辑配置">${icons.edit}</button>
                <button type="button" data-action="delete" data-id="${policy.id}" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-red-50 hover:text-red-500" title="删除策略">${icons.trash}</button>
              </div>
            </article>
          `;
        }).join('');
      }

      function renderModal() {
        if (!state.modalOpen) {
          modalRoot.innerHTML = '';
          return;
        }

        const templates = filteredTemplates();

        modalRoot.innerHTML = `
          <div class="fixed inset-0 z-[200] flex items-center justify-center bg-black/45 p-5 backdrop-blur-[3px]">
            <div class="max-h-[90vh] w-full max-w-[680px] overflow-y-auto rounded-rf-xl bg-white shadow-rf3">
              <div class="sticky top-0 z-[1] flex items-center justify-between border-b border-rf-border bg-white px-[22px] py-[18px]">
                <span class="text-base font-semibold text-rf-text">${state.editItem ? '编辑配置' : '新建订阅配置'}</span>
                <button type="button" data-action="close-modal" class="inline-flex items-center rounded-md border-none bg-transparent p-1.5 text-rf-muted transition hover:bg-slate-100 hover:text-rf-text">${icons.close}</button>
              </div>
              <form id="config-form">
                <div class="space-y-[14px] px-[22px] py-[22px]">
                  <div class="grid gap-[14px] md:grid-cols-2">
                    <div>
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">策略名称</label>
                      <input name="name" type="text" value="${escapeHtml(state.form.name)}" placeholder="my-config" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-[8px] text-[13.5px] text-rf-text outline-none transition focus:border-[#18c865] focus:ring-4 focus:ring-[rgba(24,200,101,0.1)]">
                    </div>
                    <div>
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">目标类型</label>
                      <select name="target" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-[8px] text-[13.5px] text-rf-text outline-none transition focus:border-[#18c865] focus:ring-4 focus:ring-[rgba(24,200,101,0.1)]">
                        <option value="clash-meta" ${state.form.target === 'clash-meta' ? 'selected' : ''}>Clash Meta</option>
                        <option value="stash" ${state.form.target === 'stash' ? 'selected' : ''}>Stash</option>
                        <option value="surge" ${state.form.target === 'surge' ? 'selected' : ''}>Surge</option>
                        <option value="sing-box" ${state.form.target === 'sing-box' ? 'selected' : ''}>sing-box</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">描述 <span class="ml-1 text-[11px] font-normal text-rf-muted">可选</span></label>
                    <textarea name="description" rows="2" placeholder="简要描述此策略的用途..." class="min-h-[72px] w-full resize-y rounded-rf border border-rf-border bg-white px-[11px] py-[8px] text-[13.5px] leading-[1.5] text-rf-text outline-none transition focus:border-[#18c865] focus:ring-4 focus:ring-[rgba(24,200,101,0.1)]">${escapeHtml(state.form.description)}</textarea>
                  </div>

                  <div>
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">选择订阅源 <span class="ml-1 text-[11px] font-normal text-rf-muted">已选 ${state.form.subscription_ids.length} 个</span></label>
                    ${state.subscriptions.length === 0 ? `
                      <div class="rounded-rf border border-rf-border px-3 py-3 text-[13px] text-rf-muted">
                        暂无订阅源，请先 <a href="/subscriptions" class="text-[#18c865] transition hover:text-[#18c865]Dark">创建订阅源</a>
                      </div>
                    ` : `
                      <div class="grid gap-2 md:grid-cols-2">
                        ${state.subscriptions.map((sub) => {
                          const checked = state.form.subscription_ids.includes(Number(sub.id));
                          return `
                            <button type="button" data-action="toggle-sub" data-id="${sub.id}" class="flex items-center gap-2 rounded-rf border px-[10px] py-[8px] text-left transition ${checked ? 'border-[#18c865] bg-[rgba(24,200,101,0.06)]' : 'border-rf-border bg-white hover:bg-slate-50'}">
                              <span class="flex h-[15px] w-[15px] shrink-0 items-center justify-center rounded-[4px] border-2 ${checked ? 'border-[#18c865] bg-[#18c865] text-white' : 'border-rf-border text-transparent'}">${icons.tickTiny}</span>
                              <span class="truncate text-[13px] font-medium text-rf-text">${escapeHtml(sub.name)}</span>
                            </button>
                          `;
                        }).join('')}
                      </div>
                    `}
                  </div>

                  ${state.manualNodes.length > 0 ? `
                    <div>
                      <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">手动节点 <span class="ml-1 text-[11px] font-normal text-rf-muted">已选 ${state.form.node_ids.length} 个</span></label>
                      <div class="grid gap-2 md:grid-cols-2">
                        ${state.manualNodes.map((node) => {
                          const checked = state.form.node_ids.includes(Number(node.id));
                          return `
                            <button type="button" data-action="toggle-node" data-id="${node.id}" class="flex items-center gap-2 rounded-rf border px-[10px] py-[8px] text-left transition ${checked ? 'border-[#18c865] bg-[rgba(24,200,101,0.06)]' : 'border-rf-border bg-white hover:bg-slate-50'}" title="${escapeHtml((node.protocol || '') + ' · ' + node.server + ':' + node.port)}">
                              <span class="flex h-[15px] w-[15px] shrink-0 items-center justify-center rounded-[4px] border-2 ${checked ? 'border-[#18c865] bg-[#18c865] text-white' : 'border-rf-border text-transparent'}">${icons.tickTiny}</span>
                              <span class="truncate text-[13px] font-medium text-rf-text">${escapeHtml(node.name)}</span>
                            </button>
                          `;
                        }).join('')}
                      </div>
                    </div>
                  ` : ''}

                  <div>
                    <label class="mb-[5px] block text-[12.5px] font-medium text-rf-text">规则模板</label>
                    <select name="template_name" class="w-full rounded-rf border border-rf-border bg-white px-[11px] py-[8px] text-[13.5px] text-rf-text outline-none transition focus:border-[#18c865] focus:ring-4 focus:ring-[rgba(24,200,101,0.1)]">
                      <option value="">内置模板</option>
                      ${templates.map((tpl) => `<option value="${escapeHtml(tpl.name)}" ${state.form.template_name === tpl.name ? 'selected' : ''}>${escapeHtml(tpl.name)}</option>`).join('')}
                    </select>
                  </div>

                  <label class="flex items-center gap-3 rounded-rf border border-rf-border bg-slate-50 px-3 py-[10px] text-[13px] text-rf-text">
                    <input name="enabled" type="checkbox" ${state.form.enabled ? 'checked' : ''} class="h-4 w-4 cursor-pointer accent-[#18c865]">
                    <span>启用此策略</span>
                  </label>
                </div>

                <div class="flex justify-end gap-2 rounded-b-rf-xl border-t border-rf-border bg-slate-50 px-[22px] py-[14px]">
                  <button type="button" data-action="close-modal" class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-3.5 py-[7px] text-[13.5px] font-medium text-rf-text transition hover:bg-slate-50">取消</button>
                  <button type="submit" class="inline-flex items-center gap-1.5 rounded-rf border border-[#18c865] bg-[#18c865] px-3.5 py-[7px] text-[13.5px] font-medium text-white transition hover:border-[#15b25a] hover:bg-[#15b25a] disabled:cursor-not-allowed disabled:opacity-60" ${state.saving ? 'disabled' : ''}>
                    ${state.saving ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-current border-t-transparent"></span>' : ''}
                    ${state.saving ? '保存中...' : (state.editItem ? '保存更改' : '创建策略')}
                  </button>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      function renderDeleteDialog() {
        if (!state.deleteTarget) {
          deleteRoot.innerHTML = '';
          return;
        }

        deleteRoot.innerHTML = `
          <div class="fixed inset-0 z-[220] flex items-center justify-center bg-black/45 p-5 backdrop-blur-[3px]">
            <div class="w-full max-w-[420px] rounded-rf-xl bg-white shadow-rf3">
              <div class="border-b border-rf-border px-5 py-4">
                <div class="text-[16px] font-semibold text-rf-text">确认删除</div>
              </div>
              <div class="px-5 py-4 text-[13.5px] leading-6 text-rf-muted">
                确定要删除策略「<span class="font-medium text-rf-text">${escapeHtml(state.deleteTarget.name)}</span>」吗？
                <div class="mt-2 text-[13px]">此操作不可撤销，关联的配置链接将立即失效。</div>
              </div>
              <div class="flex justify-end gap-2 rounded-b-rf-xl border-t border-rf-border bg-slate-50 px-5 py-3.5">
                <button type="button" data-action="close-delete" class="inline-flex items-center gap-1.5 rounded-rf border border-rf-border bg-white px-3.5 py-[7px] text-[13.5px] font-medium text-rf-text transition hover:bg-slate-50">取消</button>
                <button type="button" data-action="confirm-delete" class="inline-flex items-center gap-1.5 rounded-rf border border-red-500 bg-red-500 px-3.5 py-[7px] text-[13.5px] font-medium text-white transition hover:border-red-600 hover:bg-red-600 disabled:cursor-not-allowed disabled:opacity-60" ${state.deleting ? 'disabled' : ''}>
                  ${state.deleting ? '<span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-current border-t-transparent"></span>' : ''}
                  ${state.deleting ? '删除中...' : '确认删除'}
                </button>
              </div>
            </div>
          </div>
        `;
      }

      function renderAll() {
        renderContent();
        renderModal();
        renderDeleteDialog();
        renderToasts();
      }

      async function loadData() {
        state.loading = true;
        renderContent();
        try {
          const [pRes, sRes, tRes, nRes] = await Promise.all([
            get('/api/config-policies'),
            get('/api/subscriptions'),
            get('/api/templates'),
            get('/api/nodes?source=manual'),
          ]);
          state.policies = pRes.data || [];
          state.subscriptions = sRes.data || [];
          state.templates = tRes.data || [];
          state.manualNodes = nRes.data || [];
        } catch (err) {
          addToast('加载数据失败：' + err.message, 'err');
        } finally {
          state.loading = false;
          renderContent();
        }
      }

      function openCreate() {
        state.editItem = null;
        state.form = defaultForm();
        state.modalOpen = true;
        renderModal();
      }

      function openEdit(policy) {
        const validSubIDs = new Set(state.subscriptions.map((item) => Number(item.id)));
        const validNodeIDs = new Set(state.manualNodes.map((item) => Number(item.id)));
        state.editItem = policy;
        state.form = {
          name: policy.name || '',
          target: policy.target || 'clash-meta',
          subscription_ids: (policy.subscription_ids || []).map(Number).filter((id) => validSubIDs.has(id)),
          node_ids: (policy.node_ids || []).map(Number).filter((id) => validNodeIDs.has(id)),
          template_name: policy.template_name || '',
          description: policy.description || '',
          enabled: policy.enabled !== false,
        };
        state.modalOpen = true;
        renderModal();
      }

      function closeModal() {
        state.modalOpen = false;
        state.editItem = null;
        state.saving = false;
        state.form = defaultForm();
        modalRoot.innerHTML = '';
      }

      function openDelete(policy) {
        state.deleteTarget = policy;
        state.deleting = false;
        renderDeleteDialog();
      }

      function closeDelete() {
        state.deleteTarget = null;
        state.deleting = false;
        deleteRoot.innerHTML = '';
      }

      async function savePolicy() {
        syncFormFromDom();
        if (!state.form.name.trim()) {
          addToast('策略名称不能为空', 'err');
          return;
        }
        if (state.form.subscription_ids.length === 0 && state.form.node_ids.length === 0) {
          addToast('请至少选择一个订阅源或手动节点', 'err');
          return;
        }

        const payload = {
          name: state.form.name.trim(),
          target: state.form.target,
          subscription_ids: state.form.subscription_ids,
          node_ids: state.form.node_ids,
          template_name: state.form.template_name,
          description: state.form.description.trim(),
          enabled: state.form.enabled,
        };

        state.saving = true;
        renderModal();
        try {
          if (state.editItem) {
            await put('/api/config-policies/' + state.editItem.id, payload);
            addToast('策略已更新');
          } else {
            await post('/api/config-policies', payload);
            addToast('策略已创建');
          }
          closeModal();
          await loadData();
        } catch (err) {
          state.saving = false;
          renderModal();
          addToast('保存失败：' + err.message, 'err');
        }
      }

      async function confirmDelete() {
        if (!state.deleteTarget) return;
        state.deleting = true;
        renderDeleteDialog();
        try {
          await del('/api/config-policies/' + state.deleteTarget.id);
          addToast('策略 "' + state.deleteTarget.name + '" 已删除');
          closeDelete();
          await loadData();
        } catch (err) {
          state.deleting = false;
          renderDeleteDialog();
          addToast('删除失败：' + err.message, 'err');
        }
      }

      async function clearCache(policy) {
        state.refreshingId = policy.id;
        renderContent();
        try {
          await del('/api/config-policies/' + policy.id + '/cache');
          addToast('缓存已清除');
        } catch (err) {
          addToast('清除缓存失败：' + err.message, 'err');
        } finally {
          state.refreshingId = null;
          renderContent();
        }
      }

      root.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-action]');
        if (!target) return;

        const action = target.dataset.action;
        const id = Number(target.dataset.id);
        const policy = state.policies.find((item) => item.id === id);

        if (action === 'create') openCreate();
        if (action === 'edit' && policy) openEdit(policy);
        if (action === 'delete' && policy) openDelete(policy);
        if (action === 'copy-link' && policy) await copyText(getPolicyURL(policy), '配置链接已复制到剪贴板');
        if (action === 'open-link' && policy) window.open(getPolicyURL(policy), '_blank', 'noopener,noreferrer');
        if (action === 'clear-cache' && policy) await clearCache(policy);
        if (action === 'edit-template' && target.dataset.template) openTemplateEditor(target.dataset.template);
      });

      modalRoot.addEventListener('click', (event) => {
        const overlay = event.target;
        if (overlay === modalRoot.firstElementChild) {
          closeModal();
          return;
        }

        const target = event.target.closest('[data-action]');
        if (!target) return;

        if (target.dataset.action === 'close-modal') closeModal();
        if (target.dataset.action === 'toggle-sub') {
          syncFormFromDom();
          const id = Number(target.dataset.id);
          state.form.subscription_ids = state.form.subscription_ids.includes(id)
            ? state.form.subscription_ids.filter((item) => item !== id)
            : state.form.subscription_ids.concat(id);
          renderModal();
        }
        if (target.dataset.action === 'toggle-node') {
          syncFormFromDom();
          const id = Number(target.dataset.id);
          state.form.node_ids = state.form.node_ids.includes(id)
            ? state.form.node_ids.filter((item) => item !== id)
            : state.form.node_ids.concat(id);
          renderModal();
        }
      });

      modalRoot.addEventListener('change', (event) => {
        if (event.target.name === 'target') {
          syncFormFromDom();
          if (!filteredTemplates().some((tpl) => tpl.name === state.form.template_name)) {
            state.form.template_name = '';
          }
          renderModal();
        }
      });

      modalRoot.addEventListener('submit', (event) => {
        if (event.target.id !== 'config-form') return;
        event.preventDefault();
        savePolicy();
      });

      deleteRoot.addEventListener('click', (event) => {
        const overlay = event.target;
        if (overlay === deleteRoot.firstElementChild) {
          closeDelete();
          return;
        }
        const target = event.target.closest('[data-action]');
        if (!target) return;
        if (target.dataset.action === 'close-delete') closeDelete();
        if (target.dataset.action === 'confirm-delete') confirmDelete();
      });

        check: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        alert: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>',
        close: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>',
        copy: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>',

        edit: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>',
        trash: '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>',

      renderAll();
      loadData();
    })();
  </script>
