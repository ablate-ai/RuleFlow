<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuleFlow</title>
  <link rel="icon" type="image/svg+xml" href="/web/favicon.svg?v=7">
  <script src="/web/shared/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/web/shared/base.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { overflow-x: hidden; }
    #app-content .sidebar { display: none !important; }
    #app-content .main { margin-left: 0 !important; padding: 0 !important; }
    #app-content .app { min-height: auto !important; }
    #app-content .tc { left: 18px; bottom: 18px; }
    #app-content > * { min-height: calc(100vh - 56px); }
    .shell-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      color: #6b7280;
      font-size: 13px;
    }
    .shell-spin {
      width: 20px;
      height: 20px;
      border: 2px solid #18c865;
      border-top-color: transparent;
      border-radius: 9999px;
      animation: shell-rot .6s linear infinite;
      margin-right: 10px;
      flex-shrink: 0;
    }
    @keyframes shell-rot {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sb-brand">
        <div class="sb-logo">
          <img src="/web/favicon.svg?v=7" alt="" aria-hidden="true">
        </div>
        <span class="sb-name">RuleFlow</span>
      </div>
      <div class="sb-nav">
        <div class="sb-sec">主菜单</div>
        <a href="/dashboard" class="nav-lnk" data-route="/dashboard">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          控制台
        </a>
        <a href="/subscriptions" class="nav-lnk" data-route="/subscriptions">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle>
          </svg>
          订阅源
        </a>
        <a href="/nodes" class="nav-lnk" data-route="/nodes">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line>
          </svg>
          节点管理
        </a>
        <a href="/rule-sources" class="nav-lnk" data-route="/rule-sources">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16"></path>
            <path d="M4 12h10"></path>
            <path d="M4 18h7"></path>
            <path d="m16 15 2 2 4-4"></path>
          </svg>
          规则源
        </a>
        <a href="/templates" class="nav-lnk" data-route="/templates">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M7 8h10"></path>
            <path d="M7 12h4"></path>
            <path d="M7 16h7"></path>
            <path d="M16 11l2 2-2 2"></path>
          </svg>
          规则模板
        </a>
        <a href="/configs" class="nav-lnk" data-route="/configs">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"></line>
            <line x1="4" y1="10" x2="4" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12" y2="3"></line>
            <line x1="20" y1="21" x2="20" y2="16"></line>
            <line x1="20" y1="12" x2="20" y2="3"></line>
            <line x1="2" y1="14" x2="6" y2="14"></line>
            <line x1="10" y1="8" x2="14" y2="8"></line>
            <line x1="18" y1="16" x2="22" y2="16"></line>
          </svg>
          订阅配置
        </a>
        <a href="/config-access-logs" class="nav-lnk" data-route="/config-access-logs">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          访问日志
        </a>
      </div>
      <div class="sb-actions">
        <div class="sb-sec">操作</div>
        <button type="button" class="nav-lnk w-full" data-action="refresh-cache">
          <span data-role="refresh-cache-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path><path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </span>
          刷新缓存
        </button>
      </div>
      <div class="sb-foot">
        <div class="sb-meta">
          <span class="sb-ftxt">RuleFlow</span>
          <a class="sb-gh" href="https://github.com/ablate-ai/RuleFlow" target="_blank" rel="noreferrer" aria-label="GitHub 仓库">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 .5C5.65.5.5 5.66.5 12.02c0 5.09 3.29 9.4 7.86 10.92.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.78 1.2 1.78 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.72-1.55-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.14 1.17a10.9 10.9 0 0 1 5.72 0c2.18-1.48 3.13-1.17 3.13-1.17.63 1.57.24 2.73.12 3.02.73.8 1.18 1.82 1.18 3.07 0 4.41-2.69 5.38-5.26 5.67.41.35.77 1.03.77 2.08 0 1.5-.01 2.71-.01 3.08 0 .31.21.68.8.56A11.53 11.53 0 0 0 23.5 12C23.5 5.66 18.34.5 12 .5z"></path>
            </svg>
            <span>GitHub</span>
          </a>
        </div>
        <a href="/logout" class="sb-logout">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          退出
        </a>
      </div>
    </aside>
    <main class="main">
      <div id="app-content">
        <div class="shell-loading"><span class="shell-spin"></span>加载中...</div>
      </div>
    </main>
  </div>
  <div id="shell-toast-root" class="pointer-events-none fixed bottom-[18px] left-[18px] z-[9999] flex flex-col gap-2"></div>

  <script>
    const routeMeta = {
      '/dashboard': { fragment: '/app-fragments/dashboard', title: '控制台' },
      '/subscriptions': { fragment: '/app-fragments/subscriptions', title: '订阅源管理' },
      '/nodes': { fragment: '/app-fragments/nodes', title: '节点管理' },
      '/rule-sources': { fragment: '/app-fragments/rule-sources', title: '规则源管理' },
      '/templates': { fragment: '/app-fragments/templates', title: '规则模板' },
      '/configs': { fragment: '/app-fragments/configs', title: '订阅配置' },
      '/config-access-logs': { fragment: '/app-fragments/config-access-logs', title: '访问日志' },
    };
    const shellToastRoot = document.getElementById('shell-toast-root');
    const shellToasts = [];

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      })[char]);
    }

    function renderShellToasts() {
      if (!shellToastRoot) return;
      shellToastRoot.innerHTML = shellToasts.map((toast) => `
        <div class="pointer-events-auto flex min-w-[260px] max-w-[380px] items-center gap-[9px] rounded-rf-xl border px-[14px] py-[11px] text-[13.5px] font-medium shadow-rf3 ${toast.type === 'ok' ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-600'}">
          ${toast.type === 'ok' ? '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '<svg class="h-[15px] w-[15px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>'}
          <span>${escapeHtml(toast.message)}</span>
        </div>
      `).join('');
    }

    function addShellToast(message, type = 'ok') {
      const id = Date.now() + Math.random();
      shellToasts.push({ id, message, type });
      renderShellToasts();
      window.setTimeout(() => {
        const index = shellToasts.findIndex((item) => item.id === id);
        if (index >= 0) shellToasts.splice(index, 1);
        renderShellToasts();
      }, 3200);
    }

    function normalizePath(pathname) {
      return routeMeta[pathname] ? pathname : '/dashboard';
    }

    function setActiveNav(pathname) {
      const activePath = normalizePath(pathname);
      document.querySelectorAll('.nav-lnk[data-route]').forEach(link => {
        if (link.dataset.route === activePath) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    function setTitle(pathname) {
      const meta = routeMeta[normalizePath(pathname)];
      document.title = `RuleFlow - ${meta.title}`;
    }

    function loadRoute(pathname, push) {
      const activePath = normalizePath(pathname);
      const meta = routeMeta[activePath];
      setActiveNav(activePath);
      setTitle(activePath);
      window.__RULEFLOW_EMBEDDED__ = true;
      htmx.ajax('GET', meta.fragment, '#app-content');
      if (push && window.location.pathname !== activePath) {
        window.history.pushState({}, '', activePath);
      }
    }

    function setRefreshCacheLoading(loading) {
      const button = document.querySelector('[data-action="refresh-cache"]');
      const icon = document.querySelector('[data-role="refresh-cache-icon"]');
      if (!button || !icon) return;
      button.disabled = loading;
      icon.innerHTML = loading
        ? '<span class="inline-block h-[14px] w-[14px] animate-spin rounded-full border-2 border-current border-t-transparent"></span>'
        : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path><path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>';
    }

    async function triggerRefreshCache() {
      setRefreshCacheLoading(true);
      try {
        const response = await fetch('/api/cache/policies/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `请求失败: ${response.status}`);
        }
        addShellToast('缓存已刷新');
      } catch (error) {
        addShellToast(error.message || '刷新缓存失败', 'err');
      } finally {
        setRefreshCacheLoading(false);
      }
    }

    document.addEventListener('click', (event) => {
      const link = event.target.closest('a[href]');
      const refreshButton = event.target.closest('[data-action="refresh-cache"]');
      if (refreshButton) {
        event.preventDefault();
        triggerRefreshCache();
        return;
      }
      if (!link) return;
      if (link.target && link.target !== '_self') return;
      if (link.hasAttribute('download')) return;
      const url = new URL(link.href, window.location.origin);
      if (url.origin !== window.location.origin) return;
      if (!routeMeta[url.pathname]) return;
      event.preventDefault();
      loadRoute(url.pathname, true);
    });

    window.addEventListener('popstate', () => {
      loadRoute(window.location.pathname, false);
    });

    document.addEventListener('DOMContentLoaded', () => {
      renderShellToasts();
      setRefreshCacheLoading(false);
      loadRoute(window.location.pathname, false);
    });
  </script>
</body>
</html>
