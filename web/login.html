<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · RuleFlow</title>
  <link rel="icon" type="image/svg+xml" href="/web/favicon.svg?v=7">
  <script src="/web/shared/tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div class="flex min-h-screen items-center justify-center px-4">
<div class="w-full max-w-[380px] animate-slide-up-fade">
  <div class="mb-7 flex flex-col items-center gap-2.5">
    <div class="h-11 w-11 overflow-hidden rounded-rf-lg shadow-rf2">
      <img src="/web/favicon.svg?v=7" alt="" aria-hidden="true" class="block h-full w-full">
    </div>
    <div class="text-center">
      <div class="text-xl font-bold tracking-[-0.4px] text-rf-text">RuleFlow</div>
      <div class="mt-[-4px] text-[13px] text-rf-muted">订阅转换控制台</div>
    </div>
  </div>

  <div class="rounded-rf-xl border border-rf-border bg-white p-7 shadow-rf3">
    <div class="mb-5 text-[15px] font-semibold text-rf-text">输入管理密码</div>

    <div id="error-bar" class="mb-4 hidden items-center gap-2 rounded-rf border border-red-200 bg-red-50 px-3 py-2.5 text-[13px] text-red-800">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      密码错误，请重试
    </div>

    <form method="POST" action="/login" id="form">
      <input type="hidden" name="next" id="next-input">
      <div class="mb-4">
        <label for="password" class="mb-1.5 block text-[13px] font-medium text-rf-text">密码</label>
        <div class="relative">
          <input
            class="w-full rounded-rf border border-rf-border bg-white px-3 py-2.5 pr-10 text-sm leading-6 text-rf-text outline-none transition focus:border-[#18c865] focus:ring-4 focus:ring-emerald-500/10"
            type="password"
            id="password"
            name="password"
            placeholder="请输入管理密码"
            autofocus
            autocomplete="current-password"
          >
          <button
            type="button"
            class="absolute right-2.5 top-1/2 flex -translate-y-1/2 items-center border-none bg-transparent p-0.5 text-rf-subtle transition hover:text-rf-muted"
            onclick="togglePwd()"
            title="显示/隐藏密码"
          >
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button
        type="submit"
        class="mt-1 inline-flex w-full items-center justify-center rounded-rf border border-[#18c865] bg-[#18c865] px-4 py-2.5 text-sm font-semibold text-white transition hover:border-[#15b25a] hover:bg-[#15b25a] active:scale-[0.98]"
      >
        登录
      </button>
    </form>
  </div>

  <div class="mt-5 text-center text-xs text-rf-subtle">RuleFlow &copy; <span id="yr"></span></div>
  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</div>
</div>

<script>
  // 从 URL 参数读取 next 和 error
  const params = new URLSearchParams(location.search);
  document.getElementById('next-input').value = params.get('next') || '';
  if (params.get('error') === '1') {
    document.getElementById('error-bar').classList.remove('hidden');
    document.getElementById('error-bar').classList.add('flex');
  }

  function togglePwd() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      inp.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
