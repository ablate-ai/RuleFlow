<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="flow" x1="18" y1="14" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4d4d4"/>
      <stop offset="1" stop-color="#a3a3a3"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <!-- Entry node -->
  <circle cx="20" cy="20" r="4.5" fill="#fafafa"/>
  <!-- Flow paths (branching rule routes) -->
  <path d="M20 24.5 L20 32 Q20 36 24 38 L34 42" fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 32 Q20 36 16 38 L16 42" fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M24.5 20 L36 20 Q40 20 42 24 L46 32" fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Exit nodes -->
  <circle cx="36" cy="44" r="3.5" fill="#e5e5e5"/>
  <circle cx="16" cy="45" r="2.8" fill="#a3a3a3" opacity="0.6"/>
  <circle cx="47" cy="34" r="3.5" fill="#e5e5e5"/>
  <!-- Decision diamond (rule) -->
  <rect x="17" y="29" width="6" height="6" rx="1" transform="rotate(45 20 32)" fill="#fafafa" opacity="0.85"/>
</svg>
