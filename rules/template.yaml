allow-lan: true
mode: Rule
external-controller: 127.0.0.1:7892
port: 7890
socks-port: 7891
ipv6: false
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip

  prefer-h3: true
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"

  fake-ip-filter-mode: blacklist

  use-hosts: false
  use-system-hosts: true
  nameserver:

    - tls://8.8.8.8
    - tls://1.1.1.1

  nameserver-policy:

    "geosite:cn,private":
      - 218.2.2.2
      - 218.4.4.4

tun:
  enable: true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

proxies: []

proxy-groups:
# ─── 扩展字段说明（服务端处理后自动删除，不会出现在生成的配置里）─────────────────
# filter: "<正则>"
#   按节点名称过滤，只有匹配的节点会替换 __NODES__ 占位符。
#   示例：filter: "HK|香港"  → 只选香港节点进该组
#
# dialer-proxy: "<正则>"
#   链式代理：在所有节点中找到第一个匹配的节点作为中转，
#   自动给该组内每个节点注入 dialer-proxy 字段（仅 Clash/Stash 支持）。
#   示例：dialer-proxy: "SG|新加坡"  → 该组节点的流量先经过第一个 SG 节点
#
# 两个字段可以单独或同时使用，对没有这两个字段的组完全向后兼容。
# ─────────────────────────────────────────────────────────────────────────────
- type: select
  name: 🚀 Proxy
  proxies: ["⚡ Auto","DIRECT","__NODES__"]
- type: url-test
  name: ⚡ Auto
  proxies: ["__NODES__"]
  url: http://cp.cloudflare.com/generate_204
  interval: 1200
- type: url-test
  name: 🇺🇸 US
  filter: "US|美国"
  proxies: ["__NODES__"]
  url: http://cp.cloudflare.com/generate_204
  interval: 1200
- type: url-test
  name: 🇭🇰 HK
  filter: "HK|香港"
  proxies: ["__NODES__"]
  url: http://cp.cloudflare.com/generate_204
  interval: 1200
- type: url-test
  name: 🇯🇵 JP
  filter: "JP|日本"
  proxies: ["__NODES__"]
  url: http://cp.cloudflare.com/generate_204
  interval: 1200
- type: url-test
  name: 🇸🇬 SG
  filter: "SG|新加坡|Singapore"
  proxies: ["__NODES__"]
  url: http://cp.cloudflare.com/generate_204
  interval: 1200
- type: select
  name: 📺 Stream
  proxies: ["🚀 Proxy","🇺🇸 US","🇯🇵 JP","🇭🇰 HK","🇸🇬 SG","__NODES__"]
- type: select
  name: 🤖 AI
  proxies: ["🚀 Proxy","🇺🇸 US","🇯🇵 JP","__NODES__"]
