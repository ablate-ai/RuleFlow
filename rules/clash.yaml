allow-lan: true
mode: Rule
external-controller: 127.0.0.1:7892
port: 7890
socks-port: 7891
ipv6: false
dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: true
  respect-rules: true
  use-hosts: false
  use-system-hosts: true
  fake-ip-filter:
    - "+.lan"
    - "+.local"
  proxy-server-nameserver:
    - https://1.12.12.12/dns-query
    - https://223.5.5.5/dns-query
  nameserver:
    - tls://1.1.1.1
  nameserver-policy:
    "rule-set:china_sites": https://dns.alidns.com/dns-query
    "rule-set:proxy_sites": https://dns.google/dns-query
    "+.skk.moe": "https://223.5.5.5/dns-query"
    "+.zzfzzf.com": "https://223.5.5.5/dns-query"
    "+.nioint.com": system
    "+.nevint.com": system

tun:
  enable: true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

proxies: []

proxy-groups:
  - name: 🏠 Home
    hidden: true
    type: select
    proxies: ["DIRECT", "__NODES__"]
    filter: "wireguard-home"
  - type: url-test
    hidden: true
    name: My_Relay
    filter: "nya.*(港|HK)"
    proxies: ["__NODES__"]
  - type: select
    filter: "^(?!.*免费)(?=.*(bage|dmit|vmiss|rn)).*$"
    name: 🚀 Proxy
    proxies: ["⚡ Auto", "DIRECT", "__NODES__"]
  - type: url-test
    name: ⚡ Auto
    filter: "^(?!.*免费)(?=.*(bage)).*$"
    dialer-proxy: "My_Relay"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇺🇸 US
    filter: "bage.*(美国|US)"
    dialer-proxy: "My_Relay"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇭🇰 HK
    dialer-proxy: "My_Relay"
    filter: "bage.*(香港|港|HK)"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇯🇵 JP
    dialer-proxy: "My_Relay"
    filter: "bage.*(日本|Japan|JP)"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇸🇬 SG
    dialer-proxy: "My_Relay"
    filter: "bage.*(新加坡|狮|SG)"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: select
    name: 📺 Stream
    proxies: ["🚀 Proxy", "🇺🇸 US", "🇯🇵 JP", "🇭🇰 HK", "🇸🇬 SG"]
  - type: select
    dialer-proxy: "My_Relay"
    name: 🤖 AI
    proxies: ["🇺🇸 us.hnl.qqpw"]
