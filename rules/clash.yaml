allow-lan: true
mode: Rule
external-controller: 127.0.0.1:7892
port: 7890
socks-port: 7891
ipv6: false
dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip

  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: true
  respect-rules: true
  use-hosts: false
  use-system-hosts: true
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.arpa"
    - "localhost.ptlogin2.qq.com"
    - "localhost.work.weixin.qq.com"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "time.*.com"
    - "ntp.*.com"
    - "geosite:connectivity-check"
    - "geosite:private"
    - "geosite:cn"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
    - "*.n.n.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.*.xboxlive.com"
    - "+.teracloud.jp"
    - "+.t.me"
    - "+.telegram.org"
    - "+.telegram.me"
    - "+.tdesktop.com"
    - "+.telegra.ph"
    - "+.telesco.pe"
    - "+.telegram-cdn.org"
    - "+.cdn-telegram.org"
    - "+.telegramdownload.com"
    - "+.telegram.dog"
    - "+.graph.org"
    - "+.legra.ph"
    - "+.tx.me"
    - "+.tg.dev"
    - "WORKGROUP"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - system
  nameserver:
    - https://1.12.12.12/dns-query
    - https://223.5.5.5/dns-query
    - tls://8.8.8.8
    - tls://1.1.1.1
  proxy-server-nameserver:
    - https://1.12.12.12/dns-query
    - https://223.5.5.5/dns-query
  nameserver-policy:
    "geosite:geolocation-!cn": "tls://dns.google"
    "geosite:private": system
    "geosite:cn": 218.2.2.2

tun:
  enable: true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

proxies: []

proxy-groups:
  - type: select
    name: 🚀 Proxy
    proxies: ["⚡ Auto", "DIRECT", "__NODES__"]
  - type: url-test
    name: ⚡ Auto
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇺🇸 US
    filter: "美国|US"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇭🇰 HK
    filter: "香港|港|HK"
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇯🇵 JP
    filter: "日本|Japan|JP" # 客户端自己按正则过滤
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: url-test
    name: 🇸🇬 SG
    filter: "新加坡|狮|SG" # 客户端自己按正则过滤
    proxies: ["__NODES__"]
    url: http://cp.cloudflare.com/generate_204
    interval: 1200
  - type: select
    name: 📺 Stream
    proxies: ["🚀 Proxy", "🇺🇸 US", "🇯🇵 JP", "🇭🇰 HK", "🇸🇬 SG"]
  - type: select
    dialer-proxy: "🇺🇸 AI-DIALER"
    name: 🤖 AI
    proxies: ["🇺🇸 AI-PRIMARY"]
