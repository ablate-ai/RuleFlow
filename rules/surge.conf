#!MANAGED-CONFIG https://your-server/subscribe?token=YOUR_TOKEN interval=43200 strict=false
[General]
loglevel = notify
ipv6 = false
ipv6-vif = off
hijack-dns = 8.8.8.8:53, 8.8.4.4:53
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://latency-test.skk.moe/endpoint
proxy-test-udp = www.apple.com@64.6.64.6
allow-wifi-access = false
show-error-page-for-reject = true
skip-proxy = %LAN%, localhost, *.local, *.internal.example
always-real-ip = *.internal.example,*.private.example

[Replica]
hide-apple-request=1
hide-crashlytics-request=1
hide-udp=0
keyword-filter-type=none
[Panel]
stream-all = script-name=stream-all, title="流媒体解锁检测", content="请刷新面板", update-interval=-1
[Script]
stream-all = type=generic, timeout=15, script-path=https://raw.githubusercontent.com/LucaLin233/Luca_Conf/main/Surge/JS/stream-all.js

[Proxy]
__NODES__
🔒 wireguard-private = wireguard, section-name = 🔒 wireguard-private, test-url=http://192.168.100.1

[WireGuard 🔒 wireguard-private]
self-ip=10.255.255.2
private-key=YOUR_WIREGUARD_PRIVATE_KEY
mtu=1420
dns-server="192.168.100.1"
peer=(endpoint=vpn.example.com:51820, public-key="YOUR_WIREGUARD_PEER_PUBLIC_KEY", allowed-ips="192.168.100.0/24,10.255.0.0/24")

[Proxy Group]
🌐 Proxy = select,🛰 Auto,🤖 AI,🇭🇰 HK,🇺🇸 US,🇯🇵 JP,🇸🇬 SG,🛒 shop,__NODES__,interval = 1200,policy-regex-filter=^((?!v2).)*$
🛰 Auto = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=^((?!v2).)*$
🇸🇬 SG = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=新加坡|SG
BAGE = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,hidden=true,policy-regex-filter=bage,dialer-proxy=v2
🇭🇰 HK = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=香港|HK
🇺🇸 US = smart,__NODES__, url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=美国|🇺🇸|(^|-)US(-|$)
🇯🇵 JP = smart,__NODES__, url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=日本|JP
🎬 Stream = select,🤖 AI,🇺🇸 US,🇯🇵 JP,🇭🇰 HK
🤖 AI = select,🇺🇸 AI-PRIMARY, url = http://www.gstatic.com/generate_204, interval = 1200,dialer-proxy=🇺🇸 AI-DIALER

