#!MANAGED-CONFIG https://surge.surge.com/surge.conf interval=43200 strict=false
[General]
loglevel = notify
ipv6 = false
ipv6-vif = off
hijack-dns = *:53
wifi-assist = true
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
proxy-test-url = http://latency-test.skk.moe/endpoint
proxy-test-udp = www.apple.com@64.6.64.6
allow-wifi-access = false
show-error-page-for-reject = true
skip-proxy = %LAN%, localhost, *.local
dns-server = 223.5.5.5, 119.29.29.29, system


[Replica]
hide-apple-request=1
hide-crashlytics-request=1
hide-udp=0
keyword-filter-type=none
[Panel]
stream-all = script-name=stream-all, title="流媒体解锁检测", content="请刷新面板", update-interval=-1
[Script]
stream-all = type=generic, timeout=15, script-path=https://raw.githubusercontent.com/LucaLin233/Luca_Conf/main/Surge/JS/stream-all.js
[Proxy]
__NODES__

[Proxy Group]
🌐 Proxy = select,🛰 Auto,🤖 AI,🇭🇰 HK,🇺🇸 US,🇯🇵 JP,🇸🇬 SG,🛒 shop,__NODES__,interval = 1200,policy-regex-filter=^((?!v2).)*$
🛰 Auto = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=^((?!v2).)*$
🇸🇬 SG = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=新加坡|SG|狮|Singapore
My_Relay = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,hidden=true,policy-regex-filter=iku.*(香港|HK|Hong Kong)
BAGE = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,hidden=true,policy-regex-filter=bage,dialer-proxy=My_Relay
🇭🇰 HK = smart,__NODES__,url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=香港|HK|Hong
🇺🇸 US = smart,__NODES__, url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=美国|United States|🇺🇸|(?i)(^|[^A-Z])(US|USA)([^A-Z]|$)
🇯🇵 JP = smart,__NODES__, url = http://www.gstatic.com/generate_204, interval = 1200,policy-regex-filter=日本|JP|Japan
🎬 Stream = select,🤖 AI,🇺🇸 US,🇯🇵 JP,🇭🇰 HK
🤖 AI = select,🇺🇸 us.hnl.qqpw, url = http://www.gstatic.com/generate_204, interval = 1200,dialer-proxy=My_Relay

[Rule]
SUBNET,SSID:AX86U,DIRECT
SUBNET,SSID:AX86U_5G,DIRECT
RULE-SET,/rulesets/wireguard-home?target=surge,🏠 wireguard-home
RULE-SET,/rulesets/need_direct?target=surge,DIRECT
